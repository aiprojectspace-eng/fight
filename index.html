<title>FIGHTER SQUAD</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#000;
  display:flex; align-items:center; justify-content:center;
  min-height:100vh; overflow:hidden;
  font-family:'Courier New',monospace;
}
body::after {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:999;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.04) 2px,rgba(0,0,0,0.04) 3px);
}
canvas { display:block; image-rendering:pixelated; image-rendering:crisp-edges; }
#ui {
  position:fixed; top:0; left:0; right:0; bottom:0;
  display:flex; align-items:center; justify-content:center;
  pointer-events:none; z-index:10;
}
#msg {
  font-family:'Courier New',monospace;
  font-size:clamp(1.5rem,5vw,3rem);
  font-weight:900;
  color:#FFD700;
  text-shadow:0 0 20px #FF4500, 0 0 40px #CC0000;
  letter-spacing:6px;
  text-transform:uppercase;
  animation:pulse 0.5s ease-in-out infinite alternate;
  display:none;
}
@keyframes pulse{from{opacity:1;transform:scale(1);}to{opacity:.7;transform:scale(1.05);}}
#controls {
  position:fixed; bottom:8px; left:0; right:0;
  text-align:center;
  font-size:clamp(.3rem,.8vw,.55rem);
  color:#444;
  letter-spacing:2px;
  pointer-events:none; z-index:10;
}
</style>
</head>

// ── Config ──────────────────────────────────────────────
const GW=580, GH=320;
const FLOOR = GH - 60;
const GRAV = 0.7, JUMP_VEL = -15;
const SCALE = 1.5; // sprite render scale

// Animation config: frames, speed (ms per frame), loop
const ANIM = {
  idle:    { frames:'idle',    spd:180, loop:true  },
  walk:    { frames:'walk',    spd:100, loop:true  },
  punch:   { frames:'punch',   spd:70,  loop:false },
  kick:    { frames:'kick',    spd:70,  loop:false },
  crouch:  { frames:'crouch',  spd:80,  loop:false },
  jump:    { frames:'jump',    spd:100, loop:false },
  hurt:    { frames:'hurt',    spd:80,  loop:false },
  special: { frames:'special', spd:80,  loop:false },
  win:     { frames:'win',     spd:300, loop:true  },
};

// Preload all sprite images
const IMGS = {};
let loadedCount = 0, totalFrames = 0;
for(const [anim, frames] of Object.entries(SPRITES)){
  IMGS[anim] = frames.map(b64 => {
    totalFrames++;
    const img = new Image();
    img.onload = () => { loadedCount++; };
    img.src = 'data:image/png;base64,' + b64;
    return img;
  });
}

// ── Game state ───────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// Scale canvas to window
function resize(){
  const s = Math.min(window.innerWidth/GW, window.innerHeight/GH, 2.2);
  canvas.style.width  = GW*s + 'px';
  canvas.style.height = GH*s + 'px';
  canvas.width  = GW;
  canvas.height = GH;
}
resize();
window.addEventListener('resize', resize);

const keys = {};
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
});
document.addEventListener('keyup', e => keys[e.key] = false);

// ── Player factory ───────────────────────────────────────
function makePlayer(x, face, controls, tint){
  return {
    x, y: FLOOR,
    vy: 0,
    hp: 100,
    face,            // 1=right, -1=left
    controls,
    tint,
    state: 'idle',
    frame: 0,
    frameTimer: 0,
    atkCD: 0,        // attack cooldown
    hurtT: 0,        // hurt timer
    specCD: 0,
    wins: 0,
    get onGround(){ return this.y >= FLOOR - 1; },
  };
}

const P1_CTRL = { left:'a', right:'d', up:'w', punch:'f', kick:'g', special:'q', crouch:'s' };
const P2_CTRL = { left:'ArrowLeft', right:'ArrowRight', up:'ArrowUp', punch:'l', kick:'.', special:'p', crouch:'ArrowDown' };

// Tint: [r,g,b] 0-255 for color multiply
const P1_TINT = null;          // original Scorpion yellow/black
const P2_TINT = [100,140,255]; // blue Sub-Zero style

let p1 = makePlayer(120, 1, P1_CTRL, P1_TINT);
let p2 = makePlayer(GW-120, -1, P2_CTRL, P2_TINT);

// Tinted image cache
const tintCache = {};
function getTinted(animName, frameIdx, tint){
  if(!tint) return IMGS[animName]?.[frameIdx];
  const key = `${animName}_${frameIdx}_${tint.join(',')}`;
  if(tintCache[key]) return tintCache[key];
  const src = IMGS[animName]?.[frameIdx];
  if(!src || !src.complete || !src.naturalWidth) return src;
  const oc = document.createElement('canvas');
  oc.width = src.naturalWidth; oc.height = src.naturalHeight;
  const oc2 = oc.getContext('2d');
  oc2.drawImage(src, 0, 0);
  oc2.globalCompositeOperation = 'multiply';
  oc2.fillStyle = `rgb(${tint[0]},${tint[1]},${tint[2]})`;
  oc2.fillRect(0, 0, oc.width, oc.height);
  oc2.globalCompositeOperation = 'destination-in';
  oc2.drawImage(src, 0, 0);
  tintCache[key] = oc;
  return oc;
}

// ── State machine ────────────────────────────────────────
function setState(p, s){
  if(p.state === s) return;
  p.state = s;
  p.frame = 0;
  p.frameTimer = 0;
}

function tickAnim(p, dt){
  const cfg = ANIM[p.state];
  if(!cfg) return;
  p.frameTimer += dt;
  if(p.frameTimer >= cfg.spd){
    p.frameTimer = 0;
    const maxF = (IMGS[cfg.frames]?.length || 1) - 1;
    if(p.frame < maxF){
      p.frame++;
    } else if(cfg.loop){
      p.frame = 0;
    }
    // Non-looping anim done → back to idle
    if(!cfg.loop && p.frame >= maxF && p.state !== 'win'){
      setState(p, 'idle');
    }
  }
}

// ── Game logic ───────────────────────────────────────────
let blood = [], hitFX = [], gameOver = false, roundMsg = '';
let msgTimer = 0;

function showMsg(txt, dur=1800){
  const el = document.getElementById('msg');
  el.textContent = txt;
  el.style.display = 'block';
  msgTimer = dur;
}

function updatePlayer(p, opp, dt){
  if(p.hurtT > 0){ p.hurtT -= dt; if(p.hurtT<=0) setState(p,'idle'); return; }
  if(p.state === 'win') return;
  if(p.atkCD > 0) p.atkCD -= dt;
  if(p.specCD > 0) p.specCD -= dt;

  const c = p.controls;
  const moving = keys[c.left] || keys[c.right];

  // Movement
  if(keys[c.left]  && p.x > 30)         { p.x -= 2.8; if(p.onGround && p.atkCD<=0) setState(p,'walk'); }
  if(keys[c.right] && p.x < GW-30)      { p.x += 2.8; if(p.onGround && p.atkCD<=0) setState(p,'walk'); }
  if(keys[c.up]    && p.onGround)        { p.vy = JUMP_VEL; setState(p,'jump'); }
  if(keys[c.crouch]&& p.onGround && p.atkCD<=0) setState(p,'crouch');

  // Attacks
  if(keys[c.punch] && p.atkCD <= 0){
    p.atkCD = 500;
    setState(p, 'punch');
    doHit(p, opp, 12, 'punch');
  }
  if(keys[c.kick] && p.atkCD <= 0){
    p.atkCD = 600;
    setState(p, 'kick');
    doHit(p, opp, 16, 'kick');
  }
  if(keys[c.special] && p.specCD <= 0){
    p.specCD = 2500;
    setState(p, 'special');
    doHit(p, opp, 28, 'special');
  }

  // Auto idle
  if(p.onGround && p.atkCD<=0 && !moving && p.state==='walk') setState(p,'idle');
  if(p.onGround && p.atkCD<=0 && !keys[c.crouch] && p.state==='crouch') setState(p,'idle');

  // Face opponent
  if(p.state==='idle'||p.state==='walk')
    p.face = p.x < opp.x ? 1 : -1;
}

function doHit(atk, def, dmg, type){
  const dist = Math.abs(atk.x - def.x);
  const range = type==='special' ? 180 : type==='kick' ? 110 : 85;
  if(dist > range) return;
  def.hp = Math.max(0, def.hp - dmg);
  setState(def, 'hurt');
  def.hurtT = type==='special' ? 700 : 400;
  // Knockback
  const dir = def.x > atk.x ? 1 : -1;
  def.x = Math.max(30, Math.min(GW-30, def.x + dir*20));
  // Blood
  for(let i=0;i<(type==='special'?20:8);i++){
    blood.push({
      x:def.x, y:def.y-50,
      vx:(Math.random()-.5)*9, vy:Math.random()*-8,
      life:1, r:2+Math.random()*3
    });
  }
  // Hit text
  const txts = {punch:['POW!','CRACK!'],kick:['KICK!','SMASH!'],special:['GET OVER HERE!','TOASTY!','FATALITY?']};
  const pool = txts[type];
  hitFX.push({
    x:(atk.x+def.x)/2, y:def.y-80,
    text: pool[Math.floor(Math.random()*pool.length)],
    color: type==='special'?'#FFD700':'#fff',
    life:1, dur: type==='special'?1.8:0.9,
    sz: type==='special'?18:12
  });
  if(def.hp<=0) endRound();
}

function endRound(){
  if(gameOver) return; gameOver = true;
  const winner = p1.hp > p2.hp ? p1 : (p2.hp > p1.hp ? p2 : null);
  if(winner){ winner.wins++; setState(winner,'win'); }
  const label = winner===p1 ? 'P1 WINS' : winner===p2 ? 'P2 WINS' : 'DRAW!';
  const sub = p1.hp<=0||p2.hp<=0 ? 'K.O.' : 'TIME';
  setTimeout(()=>{
    showMsg(label, 999999);
    document.getElementById('msg').style.color = winner===p1?'#FFD700':'#4488FF';
  }, 1200);
}

// Reset round
function resetRound(){
  gameOver = false;
  p1 = makePlayer(120,   1, P1_CTRL, P1_TINT);
  p2 = makePlayer(GW-120,-1, P2_CTRL, P2_TINT);
  p1.wins = p1.wins||0; p2.wins = p2.wins||0;
  blood = []; hitFX = [];
  document.getElementById('msg').style.display='none';
  msgTimer = 0;
  showMsg('FIGHT!', 800);
}

// ── Render ───────────────────────────────────────────────
const STAGE_COLORS = {
  sky:   ['#050008','#120020'],
  floor: '#0a0006',
  tile1: '#110008',
  tile2: '#0d0005',
};

function drawBG(){
  // Sky gradient
  const sky = ctx.createLinearGradient(0,0,0,FLOOR);
  sky.addColorStop(0, STAGE_COLORS.sky[0]);
  sky.addColorStop(1, STAGE_COLORS.sky[1]);
  ctx.fillStyle = sky; ctx.fillRect(0,0,GW,FLOOR);

  // Distant pillars
  ctx.fillStyle = 'rgba(20,0,30,0.7)';
  for(let x=40;x<GW;x+=110){
    ctx.fillRect(x-8,30,16,FLOOR-30);
    ctx.fillRect(x-12,28,24,10);
  }

  // Torches
  const t = Date.now();
  [80,GW-80,GW/2].forEach(tx=>{
    const fl = Math.sin(t*0.008+tx)*3;
    const fg = ctx.createRadialGradient(tx,50+fl,1,tx,50,24);
    fg.addColorStop(0,'rgba(255,200,50,0.9)');
    fg.addColorStop(0.5,'rgba(255,60,0,0.5)');
    fg.addColorStop(1,'transparent');
    ctx.fillStyle=fg; ctx.beginPath();ctx.arc(tx,50,16,0,Math.PI*2);ctx.fill();
    // glow on floor
    const gf=ctx.createRadialGradient(tx,FLOOR,2,tx,FLOOR,90);
    gf.addColorStop(0,'rgba(255,60,0,0.08)');gf.addColorStop(1,'transparent');
    ctx.fillStyle=gf;ctx.fillRect(tx-90,FLOOR-20,180,60);
  });

  // Floor tiles
  for(let x=0;x<GW;x+=46){
    ctx.fillStyle = x%92===0 ? STAGE_COLORS.tile1 : STAGE_COLORS.tile2;
    ctx.fillRect(x, FLOOR, 45, GH-FLOOR);
    ctx.fillStyle='rgba(0,0,0,0.4)'; ctx.fillRect(x+45,FLOOR,1,GH-FLOOR);
  }
  // Floor edge glow
  const fe=ctx.createLinearGradient(0,FLOOR,0,FLOOR+10);
  fe.addColorStop(0,'rgba(180,0,200,0.35)'); fe.addColorStop(1,'transparent');
  ctx.fillStyle=fe; ctx.fillRect(0,FLOOR,GW,10);
  ctx.fillStyle='#220030'; ctx.fillRect(0,FLOOR,GW,2);
}

function drawShadow(p){
  ctx.fillStyle='rgba(0,0,0,0.35)';
  ctx.beginPath(); ctx.ellipse(p.x,FLOOR,22,6,0,0,Math.PI*2); ctx.fill();
}

function drawCharacter(p){
  const cfg = ANIM[p.state] || ANIM.idle;
  const frames = IMGS[cfg.frames];
  if(!frames) return;
  const fi = Math.min(p.frame, frames.length-1);
  const img = getTinted(cfg.frames, fi, p.tint);
  if(!img || !img.naturalWidth) return;

  const sw = img.naturalWidth  * SCALE;
  const sh = img.naturalHeight * SCALE;

  ctx.save();
  ctx.translate(p.x, p.y);
  if(p.face === -1) ctx.scale(-1, 1); // flip

  // Hurt flash
  if(p.hurtT > 0 && Math.floor(Date.now()/80)%2===0){
    ctx.filter='brightness(10) saturate(0)';
  }
  // Special glow
  if(p.state==='special'){
    ctx.shadowColor='#FF4500'; ctx.shadowBlur=18;
  }

  // Draw feet-anchored (bottom-center)
  ctx.drawImage(img, -sw/2, -sh, sw, sh);

  ctx.filter='none'; ctx.shadowBlur=0;
  ctx.restore();
}

function drawHUD(){
  const BW=220, BH=22, PAD=12, Y=10;

  // P1 bar
  ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillRect(PAD,Y,BW+2,BH+2);
  const p1p=p1.hp/100;
  const p1c=p1p>.5?'#00DD44':p1p>.25?'#FFCC00':'#DD0000';
  const g1=ctx.createLinearGradient(PAD,0,PAD+BW,0);
  g1.addColorStop(0,p1c); g1.addColorStop(1,p1c+'88');
  ctx.fillStyle=g1; ctx.fillRect(PAD+1,Y+1,Math.floor(BW*p1p),BH);
  ctx.strokeStyle='#FFD700'; ctx.lineWidth=1.5; ctx.strokeRect(PAD,Y,BW+2,BH+2);

  // P2 bar (right-aligned, drains right to left)
  const p2x=GW-PAD-BW-2;
  ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillRect(p2x,Y,BW+2,BH+2);
  const p2p=p2.hp/100;
  const p2c=p2p>.5?'#00DD44':p2p>.25?'#FFCC00':'#DD0000';
  const g2=ctx.createLinearGradient(p2x,0,p2x+BW,0);
  g2.addColorStop(0,p2c+'88'); g2.addColorStop(1,p2c);
  ctx.fillStyle=g2; ctx.fillRect(p2x+1+Math.floor(BW*(1-p2p)),Y+1,Math.floor(BW*p2p),BH);
  ctx.strokeStyle='#4488FF'; ctx.lineWidth=1.5; ctx.strokeRect(p2x,Y,BW+2,BH+2);

  // Names
  ctx.font='bold 9px Courier New'; ctx.shadowBlur=4;
  ctx.fillStyle='#FFD700'; ctx.shadowColor='#FFD700'; ctx.textAlign='left';
  ctx.fillText('SCORPION',PAD,Y+38);
  ctx.fillStyle='#4488FF'; ctx.shadowColor='#4488FF'; ctx.textAlign='right';
  ctx.fillText('SCORPION',GW-PAD,Y+38);
  ctx.shadowBlur=0;

  // Win dots
  for(let i=0;i<3;i++){
    ctx.fillStyle=i<p1.wins?'#FFD700':'#2a1000';
    ctx.beginPath();ctx.arc(PAD+8+i*14,Y+46,5,0,Math.PI*2);ctx.fill();
    if(i<p1.wins){ctx.strokeStyle='#FF6B00';ctx.lineWidth=1;ctx.stroke();}
  }
  for(let i=0;i<3;i++){
    ctx.fillStyle=i<p2.wins?'#4488FF':'#00102a';
    ctx.beginPath();ctx.arc(GW-PAD-8-i*14,Y+46,5,0,Math.PI*2);ctx.fill();
    if(i<p2.wins){ctx.strokeStyle='#0066FF';ctx.lineWidth=1;ctx.stroke();}
  }

  // Timer (count from round start)
  const elapsed = Math.floor((Date.now() - roundStart)/1000);
  const timeLeft = Math.max(0, 99 - elapsed);
  if(timeLeft<=0 && !gameOver) endRound();
  const tc = timeLeft>30?'#C9A84C':timeLeft>10?'#FF6B00':'#CC0000';
  ctx.fillStyle='rgba(0,0,0,0.8)'; ctx.fillRect(GW/2-22,Y-2,44,26);
  ctx.strokeStyle=tc; ctx.lineWidth=1.5; ctx.strokeRect(GW/2-22,Y-2,44,26);
  ctx.fillStyle=tc; ctx.shadowColor=tc; ctx.shadowBlur=8;
  ctx.font='bold 17px Courier New'; ctx.textAlign='center';
  ctx.fillText(String(timeLeft).padStart(2,'0'),GW/2,Y+17);
  ctx.shadowBlur=0;
}

// ── Main loop ────────────────────────────────────────────
let last = 0, roundStart = Date.now();

function loop(ts){
  const dt = Math.min(ts - last, 50); // cap delta
  last = ts;
  if(msgTimer > 0){ msgTimer -= dt; if(msgTimer<=0) document.getElementById('msg').style.display='none'; }

  // Physics
  [p1,p2].forEach(p=>{
    p.vy += GRAV * (dt/16);
    p.y  += p.vy * (dt/16);
    if(p.y >= FLOOR){ p.y=FLOOR; p.vy=0; if(p.state==='jump') setState(p,'idle'); }
  });

  if(!gameOver){
    updatePlayer(p1, p2, dt);
    updatePlayer(p2, p1, dt);
  }

  // Tick anims
  [p1,p2].forEach(p=>tickAnim(p,dt));

  // Blood particles
  blood.forEach(b=>{
    b.x+=b.vx*(dt/16); b.y+=b.vy*(dt/16); b.vy+=0.4*(dt/16);
    b.life = Math.min(b.life + dt/600, 1);
  });
  blood = blood.filter(b=>b.life<1);

  // Hit FX
  hitFX.forEach(f=>{ f.life = Math.min(f.life + dt/(f.dur*1000), 1); });
  hitFX = hitFX.filter(f=>f.life<1);

  // ── Draw ──
  drawBG();

  // Blood on floor
  blood.forEach(b=>{
    if(b.y>=FLOOR-2){ ctx.fillStyle='rgba(100,0,0,0.4)'; ctx.beginPath();ctx.arc(b.x,FLOOR,b.r*1.8,0,Math.PI*2);ctx.fill(); }
  });
  blood.forEach(b=>{
    if(b.y<FLOOR-2){ ctx.globalAlpha=1-b.life; ctx.fillStyle='#AA0000'; ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill(); ctx.globalAlpha=1; }
  });

  // Shadows
  drawShadow(p1); drawShadow(p2);

  // Fighters
  drawCharacter(p1);
  drawCharacter(p2);

  // Hit FX text
  hitFX.forEach(f=>{
    ctx.save();
    const a = 1-f.life;
    ctx.translate(f.x, f.y - f.life*20);
    ctx.globalAlpha = a;
    ctx.fillStyle = f.color; ctx.shadowColor=f.color; ctx.shadowBlur=12;
    ctx.font=`bold ${f.sz}px Courier New`; ctx.textAlign='center';
    ctx.fillText(f.text,0,0);
    ctx.restore(); ctx.shadowBlur=0;
  });

  drawHUD();

  requestAnimationFrame(loop);
}

// Start
showMsg('FIGHT!', 800);
requestAnimationFrame(ts=>{ last=ts; roundStart=Date.now(); requestAnimationFrame(loop); });

// Rematch on Enter/Space when game over
document.addEventListener('keydown', e=>{
  if(gameOver && (e.key==='Enter'||e.key===' ')){ resetRound(); roundStart=Date.now(); }
});
</script>
