<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pro-Level Humanoid Kinematics</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
    </style>
</head>
<body>
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Lighting (Cinematic Studio Setup)
        const light = new THREE.DirectionalLight(0xffffff, 2);
        light.position.set(2, 5, 5);
        scene.add(light);
        const backLight = new THREE.PointLight(0xff0044, 10, 10);
        backLight.position.set(-2, 2, -2);
        scene.add(backLight);

        const mat = new THREE.MeshStandardMaterial({ color: 0x151515, roughness: 0.2, metalness: 0.8 });

        // Helper: Buat Joint (Sfera kecik)
        const createJoint = () => new THREE.Mesh(new THREE.SphereGeometry(0.06, 16, 16), mat);
        
        // Helper: Buat Bone (Capsule yang tapered)
        const createBone = (height, radius) => {
            const mesh = new THREE.Mesh(new THREE.CapsuleGeometry(radius, height, 10, 20), mat);
            mesh.position.y = -height/2; // Pivot kat atas
            return mesh;
        };

        const body = new THREE.Group();

        // 1. Torso & Hips
        const chest = new THREE.Mesh(new THREE.CapsuleGeometry(0.2, 0.5, 10, 20), mat);
        chest.scale.set(1.5, 1, 0.8);
        chest.position.y = 1.4;
        body.add(chest);

        // 2. Head (Anatomical Ovoid)
        const head = new THREE.Mesh(new THREE.SphereGeometry(0.18, 32, 32), mat);
        head.scale.set(0.85, 1.1, 1);
        head.position.y = 0.45; // Relative to chest
        chest.add(head);

        // 3. ARM SYSTEM (Shoulder -> Elbow -> Hand)
        function buildArm(side) {
            const shoulder = createJoint();
            shoulder.position.set(side * 0.4, 0.25, 0);
            
            const upperArm = createBone(0.4, 0.07);
            shoulder.add(upperArm);
            
            const elbow = createJoint();
            elbow.position.y = -0.45;
            upperArm.add(elbow);
            
            const lowerArm = createBone(0.4, 0.05);
            elbow.add(lowerArm);
            
            return { shoulder, elbow };
        }

        const leftArm = buildArm(1);
        const rightArm = buildArm(-1);
        chest.add(leftArm.shoulder, rightArm.shoulder);

        // 4. LEG SYSTEM (Hip -> Knee -> Foot)
        function buildLeg(side) {
            const hip = createJoint();
            hip.position.set(side * 0.2, -0.3, 0);
            
            const thigh = createBone(0.5, 0.1);
            hip.add(thigh);
            
            const knee = createJoint();
            knee.position.y = -0.55;
            thigh.add(knee);
            
            const calf = createBone(0.5, 0.07);
            knee.add(calf);
            
            return { hip, knee };
        }

        const leftLeg = buildLeg(1);
        const rightLeg = buildLeg(-1);
        chest.add(leftLeg.hip, rightLeg.hip);

        scene.add(body);
        camera.position.set(0, 1.5, 4);

        // Animation Loop (Natural Walking/Combat Stance)
        function animate() {
            requestAnimationFrame(animate);
            const t = Date.now() * 0.004;

            // Shoulder rotation
            leftArm.shoulder.rotation.x = Math.sin(t) * 0.5;
            rightArm.shoulder.rotation.x = -Math.sin(t) * 0.5;

            // ELBOW FLEXING (This is what you wanted!)
            leftArm.elbow.rotation.x = Math.abs(Math.cos(t)) * 1.2;
            rightArm.elbow.rotation.x = Math.abs(Math.sin(t)) * 1.2;

            // Knee flexing
            leftLeg.knee.rotation.x = Math.abs(Math.sin(t)) * 0.8;
            rightLeg.knee.rotation.x = Math.abs(Math.cos(t)) * 0.8;

            body.rotation.y += 0.01;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
