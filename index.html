<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Realistic Human Import (No Sprites, Real 3D)</title>
    <style>
        body { margin: 0; background: #111; overflow: hidden; }
    </style>
</head>
<body>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // 1. Scene Setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Controls supaya kau boleh pusing-pusing tengok model
        const controls = new OrbitControls(camera, renderer.domElement);

        // 2. Lighting (Penting untuk model realistik)
        const ambientLight = new THREE.AmbientLight(0xffffff, 1);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 2);
        directionalLight.position.set(2, 2, 5);
        scene.add(directionalLight);

        // 3. LOAD REAL HUMAN MODEL (The Fix!)
        const loader = new GLTFLoader();
        let mixer; // Untuk animasi

        // Kau kena cari fail .glb manusia yang cantik dan letak dalam folder projek kau
        loader.load( 'path/to/your/human_model.glb', function ( gltf ) {
            const model = gltf.scene;
            scene.add( model );

            // Kalau model tu ada animasi siap-siap (macam walking/punching)
            mixer = new THREE.AnimationMixer( model );
            const clips = gltf.animations;
            if (clips.length > 0) {
                const action = mixer.clipAction( clips[0] ); // Main animasi pertama
                action.play();
            }

        }, undefined, function ( error ) {
            console.error( 'Alamak, model tak lepas load:', error );
        } );

        camera.position.set(0, 1.6, 3);
        controls.update();

        // 4. Animation Loop
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            
            // Update animasi model
            if (mixer) mixer.update(clock.getDelta());
            
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
