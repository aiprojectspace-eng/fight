<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;overflow:hidden;font-family:'Courier New',monospace;}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:99;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.05) 2px,rgba(0,0,0,0.05) 3px);}
canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges;}

#sub{font-size:clamp(.5rem,1.5vw,.9rem);color:#CC0000;letter-spacing:6px;display:none;}
#hint{font-size:clamp(.35rem,.7vw,.5rem);color:#333;letter-spacing:3px;display:none;}
@keyframes pulse{from{transform:scale(1);opacity:1;}to{transform:scale(1.06);opacity:.75;}}
#moves{position:fixed;bottom:6px;left:0;right:0;text-align:center;font-size:clamp(.28rem,.65vw,.46rem);color:#333;letter-spacing:1.5px;pointer-events:none;z-index:50;line-height:1.8;}
</style>

// ── Canvas setup ──────────────────────────────────────────
const C=document.getElementById('c');
const X=C.getContext('2d');
const GW=580,GH=300,FL=GH-55; // game width, height, floor Y
function resize(){
  const s=Math.min(innerWidth/GW,(innerHeight-30)/GH,2.5);
  C.style.width=GW*s+'px'; C.style.height=GH*s+'px';
  C.width=GW; C.height=GH;
}
resize(); addEventListener('resize',resize);

// ── Sprite loader ─────────────────────────────────────────
const IMGS={};
let loaded=0,total=0;
for(const[k,frames] of Object.entries(SP)){
  IMGS[k]=frames.map(b64=>{
    total++;
    const i=new Image();
    i.onload=()=>loaded++;
    i.src='data:image/png;base64,'+b64;
    return i;
  });
}

// Per-character tint cache (for P2 blue Sub-Zero style)
const TC={};
function tinted(anim,fi,tint){
  if(!tint) return IMGS[anim]?.[fi];
  const key=`${anim}_${fi}`;
  if(TC[key]) return TC[key];
  const src=IMGS[anim]?.[fi];
  if(!src?.naturalWidth) return src;
  const oc=document.createElement('canvas');
  oc.width=src.naturalWidth; oc.height=src.naturalHeight;
  const ox=oc.getContext('2d');
  ox.drawImage(src,0,0);
  ox.globalCompositeOperation='multiply';
  ox.fillStyle=`rgb(${tint})`;
  ox.fillRect(0,0,oc.width,oc.height);
  ox.globalCompositeOperation='destination-in';
  ox.drawImage(src,0,0);
  TC[key]=oc; return oc;
}

// Each state: { anim, spd(ms/frame), loop, hitbox? }
const STATES={
  idle:      { a:'idle',      spd:200, loop:true  },
  walk_fwd:  { a:'walk_fwd',  spd:90,  loop:true  },
  walk_back: { a:'walk_back', spd:90,  loop:true  },
  punch:     { a:'punch',     spd:60,  loop:false, dmg:8,  range:75  },
  high_kick: { a:'high_kick', spd:65,  loop:false, dmg:12, range:90  },
  sweep:     { a:'sweep',     spd:65,  loop:false, dmg:10, range:95  },
  jump_kick: { a:'jump_kick', spd:70,  loop:false, dmg:14, range:80  },
  uppercut:  { a:'uppercut',  spd:60,  loop:false, dmg:20, range:70, special:true  },
  spear:     { a:'spear',     spd:75,  loop:false, dmg:25, range:260, special:true },
  teleport:  { a:'spear',     spd:65,  loop:false, dmg:22, range:999, special:true },
  crouch:    { a:'crouch',    spd:100, loop:true  },
  hurt:      { a:'hurt',      spd:70,  loop:false },

    state:'idle',frame:0,ft:0, // ft=frame timer ms
    atkCD:0,specCD:0,hurtT:0,
    blocking:false,onGround:true,wins:0};
}

const K={};
addEventListener('keydown',e=>{K[e.key]=true;['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)&&e.preventDefault();});
addEventListener('keyup',e=>K[e.key]=false);

// ── State helpers ─────────────────────────────────────────
function set(p,s){
  if(p.state===s)return;
  // Don't interrupt active attacks unless hurt/win
  if(['punch','high_kick','sweep','uppercut','spear','teleport','jump_kick'].includes(p.state)
     && !['hurt','win'].includes(s) && p.atkCD>0) return;
  p.state=s; p.frame=0; p.ft=0;
}

function tickAnim(p,dt){
  const cfg=STATES[p.state];
  if(!cfg)return;
  p.ft+=dt;
  const frames=IMGS[cfg.a]?.length||1;
  if(p.ft>=cfg.spd){
    p.ft=0;
    if(p.frame<frames-1){ p.frame++; }
    else if(cfg.loop){ p.frame=0; }
    else if(p.state!=='win'&&p.state!=='hurt'){ set(p,'idle'); p.atkCD=0; }
    else if(p.state==='hurt'&&p.frame>=frames-1){ set(p,'idle'); p.hurtT=0; }
  }
}

// ── Game logic ────────────────────────────────────────────
let blood=[],hitFX=[],done=false,roundStart=Date.now(),msgT=0;

function showMsg(m,s='',hint='',dur=999999){
  const el=document.getElementById('msg');
  const se=document.getElementById('sub');
  const he=document.getElementById('hint');
  el.textContent=m; el.style.display='block';
  se.textContent=s; se.style.display=s?'block':'none';
  he.textContent=hint; he.style.display=hint?'block':'none';
  msgT=dur;
}
function hideMsg(){
  document.getElementById('msg').style.display='none';
  document.getElementById('sub').style.display='none';
  document.getElementById('hint').style.display='none';
}

function doHit(atk,def,dmg,type,range){
  const dist=Math.abs(atk.x-def.x);
  if(dist>range)return false;
  if(def.blocking&&type!=='sweep'&&type!=='spear'){
    // blocked — push back only
    const dir=def.x>atk.x?1:-1;
    def.x=Math.max(30,Math.min(GW-30,def.x+dir*8));
    spawnHitFX((atk.x+def.x)/2,def.y-40,'BLOCK!','#888',0.7,10);
    return false;
  }
  def.hp=Math.max(0,def.hp-dmg);
  set(def,'hurt'); def.hurtT=type==='spear'?900:type==='uppercut'?700:380;
  const dir=def.x>atk.x?1:-1;
  if(type==='uppercut') def.vy=-10;
  def.x=Math.max(30,Math.min(GW-30,def.x+dir*(type==='spear'?30:type==='sweep'?25:15)));
  // Blood
  const n=type==='spear'?22:type==='uppercut'?16:8;
  for(let i=0;i<n;i++) blood.push({x:def.x,y:def.y-45,vx:(Math.random()-.5)*10,vy:-Math.random()*9,vy2:0,life:0,r:2+Math.random()*3});
  // Hit text
  const texts={punch:['JAB!','CROSS!'],high_kick:['KICK!','SMASH!'],sweep:['SWEEP!','DOWN!'],
    jump_kick:['JUMP KICK!'],uppercut:['UPPERCUT!','RISING FIST!'],
    spear:['GET OVER HERE!','SCORPION!'],teleport:['TELEPORT!','FROM BELOW!']};
  spawnHitFX((atk.x+def.x)/2,def.y-(type==='spear'?60:80),
    (texts[type]||['HIT!'])[Math.floor(Math.random()*(texts[type]?.length||1))],
    type==='spear'||type==='uppercut'||type==='teleport'?'#FFD700':'#fff',
    type==='spear'||type==='uppercut'?2.0:0.9,
    type==='spear'||type==='teleport'?18:12);
  if(def.hp<=0) endRound();
  return true;
}

function spawnHitFX(x,y,txt,col,dur,sz){
  hitFX.push({x,y,txt,col,dur,sz,life:0});
}

function tryAttack(p,opp,type){
  const cfg=STATES[type];
  if(!cfg||p.atkCD>0)return;
  // Special cooldown
  if(cfg.special&&p.specCD>0)return;
  set(p,type);
  p.atkCD=cfg.spd*(IMGS[cfg.a]?.length||1)+80;
  if(cfg.special) p.specCD=2200;
  // Delay hit to midpoint of animation
  const hitDelay=cfg.spd*Math.floor((IMGS[cfg.a]?.length||1)*0.5);
  setTimeout(()=>{ if(!done) doHit(p,opp,cfg.dmg,type,cfg.range); },hitDelay);
}

function update(p,opp,dt){
  if(p.hurtT>0){ p.hurtT-=dt; if(p.hurtT<=0){set(p,'idle');} return; }
  if(p.state==='win')return;
  if(p.atkCD>0) p.atkCD-=dt;
  if(p.specCD>0) p.specCD-=dt;
  const c=p.ctrl;
  const facingOpp = (p.face===1&&opp.x>p.x)||(p.face===-1&&opp.x<p.x);

  // Block
  p.blocking=K[c.block]&&p.onGround&&p.atkCD<=0;
  if(p.blocking){set(p,'crouch');return;}

  // Specials
  if(K[c.special_spear])  tryAttack(p,opp,'spear');
  else if(K[c.special_up]) tryAttack(p,opp,'uppercut');
  else if(K[c.special_tp]) tryAttack(p,opp,'teleport');
  // Normal attacks
  else if(K[c.punch])  tryAttack(p,opp,'punch');
  else if(K[c.kick])   tryAttack(p,opp,'high_kick');
  else if(K[c.sweep])  tryAttack(p,opp,'sweep');

  // Jump attack
  if(!p.onGround&&K[c.kick]&&p.atkCD<=0) tryAttack(p,opp,'jump_kick');

  // Movement (only when not attacking)
  if(p.atkCD<=0){
    if(K[c.left]&&p.x>30){
      p.x-=2.5;
      if(p.onGround) set(p, facingOpp?'walk_back':'walk_fwd');
    } else if(K[c.right]&&p.x<GW-30){
      p.x+=2.5;
      if(p.onGround) set(p, facingOpp?'walk_fwd':'walk_back');
    } else if(p.onGround&&p.state!=='crouch'){
      set(p,'idle');
    }
  }

  // Jump
  if(K[c.up]&&p.onGround){ p.vy=-15; p.onGround=false; }

  // Always face opponent when idle/walking
  if(['idle','walk_fwd','walk_back'].includes(p.state))
    p.face=p.x<opp.x?1:-1;
}

function endRound(){
  if(done)return; done=true;
  const w=p1.hp>p2.hp?p1:p2.hp>p1.hp?p2:null;
  if(w){w.wins++;set(w,'win');}
  const lbl=w?`${w.label} WINS!`:'DRAW!';
  document.getElementById('msg').style.color=w===p1?'#FFD700':'#4488FF';
  setTimeout(()=>showMsg(lbl,'K.O.','PRESS ENTER TO REMATCH'),1300);
}

// ── Render ────────────────────────────────────────────────
function drawBG(now){
  // Dark palace background
  const sky=X.createLinearGradient(0,0,0,FL);
  sky.addColorStop(0,'#060006'); sky.addColorStop(1,'#1a0020');
  X.fillStyle=sky; X.fillRect(0,0,GW,FL);

  // Back wall arch
  X.fillStyle='rgba(15,0,20,0.9)';
  X.beginPath(); X.arc(GW/2,FL,260,Math.PI,0); X.fill();

  // Pillars
  for(let px=30;px<GW;px+=115){
    const pg=X.createLinearGradient(px-10,0,px+10,0);
    pg.addColorStop(0,'#0a0012'); pg.addColorStop(0.4,'#180025'); pg.addColorStop(1,'#0a0012');
    X.fillStyle=pg; X.fillRect(px-10,20,20,FL-20);
    X.fillStyle='#200030'; X.fillRect(px-14,16,28,10); X.fillRect(px-14,FL-6,28,10);
  }

  // Torches
  [60,GW-60,GW/2-40,GW/2+40].forEach(tx=>{
    const fl=Math.sin(now*0.007+tx)*4;
    const fg=X.createRadialGradient(tx,45+fl,1,tx,45,28);
    fg.addColorStop(0,'rgba(255,180,40,0.95)');
    fg.addColorStop(0.4,'rgba(255,50,0,0.55)');
    fg.addColorStop(1,'transparent');
    X.fillStyle=fg; X.beginPath(); X.arc(tx,46,20,0,Math.PI*2); X.fill();
    // floor glow
    const gf=X.createRadialGradient(tx,FL,2,tx,FL,70);
    gf.addColorStop(0,'rgba(255,50,0,0.1)'); gf.addColorStop(1,'transparent');
    X.fillStyle=gf; X.fillRect(tx-70,FL-10,140,50);
  });

  // Floor
  for(let fx=0;fx<GW;fx+=40){
    X.fillStyle=fx%80===0?'#0e0016':'#0b0012';
    X.fillRect(fx,FL,39,GH-FL);
    X.fillStyle='rgba(0,0,0,0.5)'; X.fillRect(fx+39,FL,1,GH-FL);
  }
  // Floor edge
  const fe=X.createLinearGradient(0,FL,0,FL+8);
  fe.addColorStop(0,'rgba(200,0,255,0.4)'); fe.addColorStop(1,'transparent');
  X.fillStyle=fe; X.fillRect(0,FL,GW,8);
  X.fillStyle='#2a0040'; X.fillRect(0,FL,GW,2);
}

function drawChar(p){
  const cfg=STATES[p.state]||STATES.idle;
  const frms=IMGS[cfg.a];
  if(!frms) return;
  const fi=Math.min(p.frame,frms.length-1);
  const img=p.tint?tinted(cfg.a,fi,p.tint):frms[fi];
  if(!img?.naturalWidth) return;

  const sw=img.naturalWidth*SCALE, sh=img.naturalHeight*SCALE;

  X.save();
  X.translate(p.x,p.y);
  if(p.face===-1) X.scale(-1,1);

  // Hurt flash
  if(p.hurtT>0&&Math.floor(Date.now()/75)%2===0)
    X.filter='brightness(8) saturate(0)';
  // Special glow
  if(['spear','uppercut','teleport'].includes(p.state)){
    X.shadowColor=p.tint?'#4488FF':'#FF6600';
    X.shadowBlur=16;
  }
  // Block tint
  if(p.blocking){X.globalAlpha=0.7;X.filter='brightness(0.6)';}

  X.drawImage(img,-sw/2,-sh,sw,sh);
  X.filter='none'; X.shadowBlur=0; X.globalAlpha=1;
  X.restore();
}

function drawHUD(){
  const BW=220,BH=22,PAD=10,Y=8;

  // P1
  X.fillStyle='rgba(0,0,0,0.7)'; X.fillRect(PAD,Y,BW+2,BH+2);
  const pct1=p1.hp/100;
  const col1=pct1>.5?'#22DD55':pct1>.25?'#FFCC00':'#DD1100';
  const g1=X.createLinearGradient(PAD,0,PAD+BW,0);
  g1.addColorStop(0,col1); g1.addColorStop(1,col1+'99');
  X.fillStyle=g1; X.fillRect(PAD+1,Y+1,BW*pct1|0,BH);
  X.strokeStyle='#FFD700'; X.lineWidth=1.5; X.strokeRect(PAD,Y,BW+2,BH+2);

  // P2 (right side, drains inward)
  const rx=GW-PAD-BW-2;
  X.fillStyle='rgba(0,0,0,0.7)'; X.fillRect(rx,Y,BW+2,BH+2);
  const pct2=p2.hp/100;
  const col2=pct2>.5?'#22DD55':pct2>.25?'#FFCC00':'#DD1100';
  const g2=X.createLinearGradient(rx,0,rx+BW,0);
  g2.addColorStop(0,col2+'99'); g2.addColorStop(1,col2);
  X.fillStyle=g2; X.fillRect(rx+1+(BW*(1-pct2)|0),Y+1,BW*pct2|0,BH);
  X.strokeStyle='#4488FF'; X.lineWidth=1.5; X.strokeRect(rx,Y,BW+2,BH+2);

  // Names
  X.font='bold 8px Courier New'; X.shadowBlur=5;
  X.fillStyle='#FFD700'; X.shadowColor='#FFD700'; X.textAlign='left';
  X.fillText('SCORPION',PAD,Y+35);
  X.fillStyle='#4488FF'; X.shadowColor='#4488FF'; X.textAlign='right';
  X.fillText('SUB-ZERO',GW-PAD,Y+35);
  X.shadowBlur=0;

  // Win dots
  for(let i=0;i<3;i++){
    X.fillStyle=i<p1.wins?'#FFD700':'#220a00';
    X.beginPath();X.arc(PAD+7+i*13,Y+44,4,0,Math.PI*2);X.fill();
  }
  for(let i=0;i<3;i++){
    X.fillStyle=i<p2.wins?'#4488FF':'#001020';
    X.beginPath();X.arc(GW-PAD-7-i*13,Y+44,4,0,Math.PI*2);X.fill();
  }

  // Special cooldown bars
  const sc1=Math.max(0,1-p1.specCD/2200);
  X.fillStyle='#1a0000'; X.fillRect(PAD,Y+50,BW/2,4);
  X.fillStyle='#FF6600'; X.fillRect(PAD,Y+50,(BW/2*sc1)|0,4);
  const sc2=Math.max(0,1-p2.specCD/2200);
  const sx2=GW-PAD-BW/2;
  X.fillStyle='#001020'; X.fillRect(sx2,Y+50,BW/2,4);
  X.fillStyle='#0088FF'; X.fillRect(sx2+(BW/2*(1-sc2))|0,Y+50,(BW/2*sc2)|0,4);
  X.font='5px Courier New'; X.textAlign='left';
  X.fillStyle='#442200'; X.fillText('SPECIAL',PAD,Y+62);
  X.textAlign='right'; X.fillStyle='#002244';
  X.fillText('SPECIAL',GW-PAD,Y+62);

  // Timer
  const t=Math.max(0,99-((Date.now()-roundStart)/1000|0));
  if(t<=0&&!done) endRound();
  const tc=t>30?'#C9A84C':t>10?'#FF6B00':'#CC0000';
  X.fillStyle='rgba(0,0,0,0.8)'; X.fillRect(GW/2-20,Y-1,40,24);
  X.strokeStyle=tc; X.lineWidth=1.5; X.strokeRect(GW/2-20,Y-1,40,24);
  X.fillStyle=tc; X.shadowColor=tc; X.shadowBlur=8;
  X.font='bold 16px Courier New'; X.textAlign='center';
  X.fillText(String(t).padStart(2,'0'),GW/2,Y+16);
  X.shadowBlur=0;
}

// ── Main loop ─────────────────────────────────────────────
let last=0;
function loop(ts){
  const dt=Math.min(ts-last,50); last=ts;
  const now=ts;

  // Physics
  [p1,p2].forEach(p=>{
    p.vy+=0.7*(dt/16);
    p.y+=p.vy*(dt/16);
    if(p.y>=FL){p.y=FL;p.vy=0;p.onGround=true;
      if(p.state==='jump_kick'&&p.atkCD<=0) set(p,'idle');
    } else p.onGround=false;
  });

  if(!done){ update(p1,p2,dt); update(p2,p1,dt); }
  [p1,p2].forEach(p=>tickAnim(p,dt));

  // Blood physics
  blood.forEach(b=>{b.x+=b.vx*(dt/16);b.vy2+=0.45*(dt/16);b.y+=b.vy*(dt/16)+b.vy2*(dt/16);b.life=Math.min(1,b.life+dt/700);});
  blood=blood.filter(b=>b.life<1);
  hitFX.forEach(f=>{f.life=Math.min(1,f.life+dt/(f.dur*1000));});
  hitFX=hitFX.filter(f=>f.life<1);

  // Draw
  drawBG(now);

  // Blood on floor
  blood.forEach(b=>{
    if(b.y>=FL-1){X.fillStyle='rgba(90,0,0,0.45)';X.beginPath();X.arc(b.x,FL,b.r*1.6,0,Math.PI*2);X.fill();}
    else{X.globalAlpha=1-b.life;X.fillStyle='#AA0000';X.beginPath();X.arc(b.x,b.y,b.r,0,Math.PI*2);X.fill();X.globalAlpha=1;}
  });

  // Shadows
  [p1,p2].forEach(p=>{
    X.fillStyle='rgba(0,0,0,0.3)';
    X.beginPath(); X.ellipse(p.x,FL,20,5,0,0,Math.PI*2); X.fill();
  });

  drawChar(p1); drawChar(p2);

  // Hit FX
  hitFX.forEach(f=>{
    X.save(); const a=1-f.life;
    X.translate(f.x,f.y-f.life*22); X.globalAlpha=a;
    X.fillStyle=f.col; X.shadowColor=f.col; X.shadowBlur=10;
    X.font=`bold ${f.sz}px Courier New`; X.textAlign='center';
    X.fillText(f.txt,0,0); X.restore(); X.shadowBlur=0;
  });

  drawHUD();
  requestAnimationFrame(loop);
}

// ── Start ─────────────────────────────────────────────────
function startRound(){
  done=false;
  p1=mkP(110,1,C1,null,'SCORPION');
  p2=mkP(GW-110,-1,C2,'80,140,255','SUB-ZERO');
  blood=[]; hitFX=[];
  roundStart=Date.now();
  hideMsg();
  showMsg('FIGHT!','','',900);
}

addEventListener('keydown',e=>{
  if(done&&e.key==='Enter'){ startRound(); }
});

showMsg('FIGHT!','','',900);
requestAnimationFrame(ts=>{last=ts;roundStart=Date.now();requestAnimationFrame(loop);});
</script>
