<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIGHTER SQUAD — MORTAL EDITION</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@900&family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{--blood:#8B0000;--gold:#C9A84C;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;font-family:'Cinzel',serif;display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden;color:#fff;cursor:crosshair;}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:999;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.06) 3px,rgba(0,0,0,0.06) 4px);}
.screen{display:none;width:100vw;height:100vh;align-items:center;justify-content:center;flex-direction:column;}
.screen.active{display:flex;}

#ws{background:radial-gradient(ellipse at 50% 60%,#1a0400 0%,#000 70%);gap:20px;text-align:center;padding:20px;position:relative;overflow:hidden;}
#ws::before,#ws::after{content:'';position:absolute;bottom:0;width:120px;background:linear-gradient(to top,#FF4500,#FF6B00,#FFD700,transparent);animation:flicker 0.3s step-end infinite alternate;opacity:0.45;filter:blur(14px);}
#ws::before{left:0;height:55%;}#ws::after{right:0;height:65%;}
@keyframes flicker{0%{height:50%;opacity:0.4}100%{height:70%;opacity:0.55}}
.mk-title{font-family:'Cinzel Decorative',serif;font-size:clamp(2rem,7vw,4.5rem);font-weight:900;letter-spacing:6px;background:linear-gradient(180deg,#FFD700 0%,#C9A84C 40%,#8B6914 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 30px rgba(201,168,76,0.8));animation:titleGlow 2s ease-in-out infinite;line-height:1.1;}
@keyframes titleGlow{0%,100%{filter:drop-shadow(0 0 20px rgba(201,168,76,0.5));}50%{filter:drop-shadow(0 0 50px rgba(201,168,76,1));}}
.mk-sub{font-size:clamp(0.4rem,1.5vw,0.65rem);color:#CC0000;letter-spacing:8px;margin-top:4px;}
.btn-mk{font-family:'Cinzel Decorative',serif;font-size:clamp(0.65rem,2vw,0.9rem);padding:15px 48px;background:linear-gradient(180deg,#CC0000,#8B0000);color:#FFD700;border:2px solid #C9A84C;cursor:pointer;letter-spacing:4px;clip-path:polygon(8px 0%,calc(100% - 8px) 0%,100% 8px,100% calc(100% - 8px),calc(100% - 8px) 100%,8px 100%,0% calc(100% - 8px),0% 8px);box-shadow:0 0 20px rgba(204,0,0,0.5);transition:all 0.15s;text-transform:uppercase;}
.btn-mk:hover{background:linear-gradient(180deg,#FF2D2D,#CC0000);box-shadow:0 0 40px rgba(204,0,0,0.9);transform:scale(1.03);}
.btn-mk:active{transform:scale(0.97);}
.btn-ol{font-family:'Cinzel',serif;font-size:clamp(0.45rem,1.5vw,0.65rem);padding:11px 36px;background:transparent;color:#C9A84C;border:1px solid #C9A84C;cursor:pointer;letter-spacing:3px;text-transform:uppercase;transition:all 0.15s;}
.btn-ol:hover{background:rgba(201,168,76,0.1);}
.drip{position:absolute;top:0;width:2px;background:linear-gradient(to bottom,transparent,#CC0000 60%,#880000);border-radius:0 0 3px 3px;animation:drip linear infinite;}
@keyframes drip{0%{height:0;opacity:1;top:0}80%{opacity:1}100%{height:50%;opacity:0}}

#ss{background:radial-gradient(ellipse at 50% 80%,#1a0600 0%,#000 65%);gap:14px;padding:14px;text-align:center;}
.sel-t{font-family:'Cinzel Decorative',serif;font-size:clamp(0.6rem,2.5vw,1.1rem);color:#C9A84C;letter-spacing:5px;text-shadow:0 0 20px rgba(201,168,76,0.5);}
.sel-hints{display:flex;gap:28px;justify-content:center;flex-wrap:wrap;font-size:clamp(0.27rem,0.9vw,0.42rem);letter-spacing:2px;}
.p1c{color:#00BFFF;}.p2c{color:#CC0000;}
.cg{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;max-width:820px;}
.cc{width:140px;border:2px solid #2a1000;background:#060300;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden;clip-path:polygon(4px 0%,calc(100% - 4px) 0%,100% 4px,100% calc(100% - 4px),calc(100% - 4px) 100%,4px 100%,0% calc(100% - 4px),0% 4px);}
.cc:hover{border-color:#C9A84C;transform:translateY(-5px);box-shadow:0 10px 30px rgba(0,0,0,0.9);}
.cc.p1s{border-color:#00BFFF;box-shadow:0 0 20px rgba(0,191,255,0.4);}
.cc.p2s{border-color:#CC0000;box-shadow:0 0 20px rgba(204,0,0,0.5);}
.ci{padding:7px 6px;border-top:1px solid #2a1000;background:rgba(0,0,0,0.75);}
.cn{font-size:0.36rem;letter-spacing:2px;text-transform:uppercase;}
.ct{font-size:0.26rem;letter-spacing:1px;margin-top:2px;opacity:0.6;}
.badge{position:absolute;top:4px;font-size:0.26rem;padding:2px 5px;font-family:'Cinzel',serif;letter-spacing:1px;clip-path:polygon(4px 0%,100% 0%,calc(100% - 4px) 100%,0% 100%);}
.p1b{left:4px;background:#00BFFF;color:#000;}.p2b{right:4px;background:#CC0000;color:#fff;}
.sel-st{display:flex;gap:36px;justify-content:center;flex-wrap:wrap;font-size:clamp(0.32rem,1.1vw,0.5rem);letter-spacing:2px;min-height:18px;}

#gs2{flex-direction:column;background:#000;}
canvas{display:block;}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.88);align-items:center;justify-content:center;flex-direction:column;gap:16px;z-index:500;}
.ov.show{display:flex;}
.ov-t{font-family:'Cinzel Decorative',serif;font-size:clamp(1.4rem,5vw,3rem);color:#CC0000;text-shadow:0 0 40px #8B0000;animation:titleGlow 1s infinite;letter-spacing:4px;}
.ov-s{font-size:clamp(0.45rem,1.8vw,0.8rem);color:#C9A84C;letter-spacing:6px;}
.ov-sc{font-size:clamp(0.32rem,1vw,0.5rem);color:#666;letter-spacing:2px;}

.mc{display:none;width:100%;max-width:640px;background:#080300;padding:5px;justify-content:space-between;border-top:1px solid #1a0800;}
@media(max-width:720px){.mc{display:flex;}}
.ml{font-size:0.26rem;letter-spacing:2px;text-align:center;margin-bottom:3px;}
.mr{display:flex;gap:4px;}
.mb2{width:44px;height:44px;background:#0a0400;border:1px solid;color:#fff;font-size:0.55rem;cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none;display:flex;align-items:center;justify-content:center;clip-path:polygon(3px 0%,calc(100% - 3px) 0%,100% 3px,100% calc(100% - 3px),calc(100% - 3px) 100%,3px 100%,0% calc(100% - 3px),0% 3px);}
.mb2:active,.mb2.pr{background:#1a0800;}
.p1mb{border-color:#00BFFF;color:#00BFFF;}.p2mb{border-color:#CC0000;color:#CC0000;}
</style>
</head>
<body>

<div class="screen active" id="ws">
  <div style="position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:20px;">
    <div style="font-size:clamp(3rem,10vw,5.5rem);filter:drop-shadow(0 0 30px #CC0000);animation:titleGlow 1.5s infinite;">🐉</div>
    <div class="mk-title">FIGHTER<br>SQUAD</div>
    <div class="mk-sub">MORTAL EDITION</div>
    <div style="height:1px;width:220px;background:linear-gradient(90deg,transparent,#C9A84C,transparent);"></div>
    <button class="btn-mk" onclick="goSel()">⚔ ENTER THE ARENA</button>
    <button class="btn-ol" onclick="goSel()">SELECT YOUR FIGHTER</button>
    <div style="font-size:clamp(0.28rem,1vw,0.4rem);color:#1a0800;letter-spacing:4px;margin-top:4px;">THERE CAN BE ONLY ONE</div>
  </div>
</div>

<div class="screen" id="ss">
  <div class="sel-t">⚔ CHOOSE YOUR FIGHTER ⚔</div>
  <div class="sel-hints">
    <span class="p1c">P1 — WASD + F(punch) G(kick) Q(special)</span>
    <span class="p2c">P2 — ARROWS + L(punch) .(kick) P(special)</span>
  </div>
  <div class="cg" id="cg"></div>
  <div class="sel-st">
    <span class="p1c" id="p1st">P1 — CHOOSE FIGHTER</span>
    <span class="p2c" id="p2st">P2 — CHOOSE FIGHTER</span>
  </div>
  <button class="btn-mk" id="bFight" style="display:none" onclick="startFight()">⚔ FIGHT!</button>
</div>

<div class="screen" id="gs2">
  <canvas id="gc"></canvas>
  <div class="mc" id="mc">
    <div><div class="ml p1c">P1</div>
      <div class="mr"><div style="width:44px"></div><button class="mb2 p1mb" id="m1u">▲</button><div style="width:44px"></div></div>
      <div class="mr" style="margin-top:4px;"><button class="mb2 p1mb" id="m1l">◄</button><button class="mb2 p1mb" id="m1p">👊</button><button class="mb2 p1mb" id="m1r">►</button></div>
    </div>
    <div style="display:flex;flex-direction:column;gap:4px;justify-content:flex-end;">
      <button class="mb2 p1mb" id="m1k" style="width:88px;font-size:0.4rem;">KICK</button>
      <button class="mb2 p1mb" id="m1s" style="width:88px;font-size:0.38rem;">SPECIAL</button>
    </div>
    <div style="display:flex;flex-direction:column;gap:4px;justify-content:flex-end;">
      <button class="mb2 p2mb" id="m2k" style="width:88px;font-size:0.4rem;">KICK</button>
      <button class="mb2 p2mb" id="m2s" style="width:88px;font-size:0.38rem;">SPECIAL</button>
    </div>
    <div><div class="ml p2c">P2</div>
      <div class="mr"><div style="width:44px"></div><button class="mb2 p2mb" id="m2u">▲</button><div style="width:44px"></div></div>
      <div class="mr" style="margin-top:4px;"><button class="mb2 p2mb" id="m2l">◄</button><button class="mb2 p2mb" id="m2p">👊</button><button class="mb2 p2mb" id="m2r">►</button></div>
    </div>
  </div>
</div>

<div class="ov" id="ov">
  <div class="ov-t" id="ovT">FIGHT!</div>
  <div class="ov-s" id="ovS"></div>
  <div class="ov-sc" id="ovSc"></div>
  <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center;" id="ovBtns">
    <button class="btn-mk" onclick="startFight()">▶ REMATCH</button>
    <button class="btn-ol" onclick="goSel()">◀ CHANGE FIGHTER</button>
  </div>
</div>

<script>
// ─────────────────────────────────────────────────────────
// CHARACTER DATA
// ─────────────────────────────────────────────────────────
const CHARS = [
  { name:'FARUQAL', title:'IRON FIST',    icon:'👊', accent:'#4A90D9', glow:'#00BFFF', spec:'SEISMIC SLAM' },
  { name:'SYIDA',   title:'SHADOW VEIL',  icon:'🌙', accent:'#E8C4A0', glow:'#FFE4B5', spec:'VEIL STORM'   },
  { name:'IKA',     title:'CRIMSON ROSE', icon:'🌹', accent:'#CC3344', glow:'#FF6688', spec:'ROSE FURY'    },
  { name:'FAISAL',  title:'STRATEGIST',   icon:'⚡', accent:'#C9A84C', glow:'#FFD700', spec:'MIND STRIKE'  },
  { name:'IKMAL',   title:'TEMPEST',      icon:'🌪️', accent:'#2ECC71', glow:'#00FF88', spec:'STORM RAGE'   },
];

let p1i=null,p2i=null,keys={},raf,gs={};
const GW=600,GH=360,FLOOR=GH-72,GRAV=0.58,JUMP=-14;

// ─────────────────────────────────────────────────────────
// REALISTIC SPRITE RENDERER
// Uses layered gradients, radial shading, detailed anatomy
// to simulate digitized photo look
// ─────────────────────────────────────────────────────────

const SKIN = {
  faruqal: { base:'#C4946A', mid:'#B07850', dark:'#8B5A32', light:'#DDB080', lip:'#A0604A' },
  syida:   { base:'#C8906A', mid:'#B07850', dark:'#8B5A32', light:'#DDB080', lip:'#B06858' },
  ika:     { base:'#C08060', mid:'#A87050', dark:'#865030', light:'#D8A070', lip:'#A05848' },
  faisal:  { base:'#C09060', mid:'#A87848', dark:'#886030', light:'#D4A070', lip:'#9A6040' },
  ikmal:   { base:'#A8C090', mid:'#88A070', dark:'#608050', light:'#C4D8A8', lip:'#789068' },
};

// ── Shared drawing utilities ──────────────────────────────
function ellipseFill(ctx,x,y,rx,ry,col,alpha=1){
  ctx.globalAlpha=alpha; ctx.fillStyle=col;
  ctx.beginPath(); ctx.ellipse(x,y,rx,ry,0,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=1;
}
function addShading(ctx,x,y,rx,ry,col,alpha){
  const g=ctx.createRadialGradient(x-rx*0.2,y-ry*0.2,1,x,y,Math.max(rx,ry));
  g.addColorStop(0,'transparent'); g.addColorStop(1,col);
  ctx.globalAlpha=alpha; ctx.fillStyle=g;
  ctx.beginPath(); ctx.ellipse(x,y,rx,ry,0,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=1;
}
function addHighlight(ctx,x,y,rx,ry,alpha=0.35){
  const g=ctx.createRadialGradient(x,y,0,x,y,rx);
  g.addColorStop(0,`rgba(255,255,255,${alpha})`); g.addColorStop(1,'transparent');
  ctx.fillStyle=g; ctx.beginPath(); ctx.ellipse(x,y,rx,ry,0,0,Math.PI*2); ctx.fill();
}

// ── HEAD renderer — photo-realistic shading ───────────────
function drawRealisticHead(ctx, cfg){
  const {x,y, w,h, sk, hair, hasHijab, hijabCol, hijabAccent,
    hasGlasses, glassStyle, hurt, special, accentCol} = cfg;

  // Neck
  const neckG=ctx.createLinearGradient(x-5,y+h*0.5,x+5,y+h*0.5);
  neckG.addColorStop(0,sk.dark); neckG.addColorStop(0.4,sk.base); neckG.addColorStop(1,sk.mid);
  ctx.fillStyle=neckG;
  ctx.beginPath(); ctx.roundRect(x-w*0.14,y+h*0.42,w*0.28,h*0.28,4); ctx.fill();

  if(hasHijab){
    // Outer hijab — large fabric shape
    const hg=ctx.createRadialGradient(x,y,5,x,y+h*0.1,w*0.6);
    hg.addColorStop(0,hijabAccent||lighten(hijabCol,30));
    hg.addColorStop(0.5,hijabCol);
    hg.addColorStop(1,darken(hijabCol,25));
    ctx.fillStyle=hg;
    ctx.beginPath();
    ctx.ellipse(x,y+h*0.08,w*0.54,h*0.55,0,0,Math.PI*2);
    ctx.fill();
    // Fabric fold shading
    addShading(ctx,x+w*0.3,y+h*0.3,w*0.2,h*0.25,'rgba(0,0,0,0.2)',0.6);
    addShading(ctx,x-w*0.3,y-h*0.1,w*0.15,h*0.2,'rgba(0,0,0,0.15)',0.5);
    // Hijab highlight
    addHighlight(ctx,x-w*0.1,y-h*0.25,w*0.2,h*0.1,0.2);
    // Fabric texture lines
    ctx.strokeStyle=`rgba(0,0,0,0.08)`; ctx.lineWidth=0.8;
    for(let i=0;i<4;i++){
      ctx.beginPath();
      ctx.moveTo(x-w*0.3+i*w*0.15,y-h*0.3);
      ctx.bezierCurveTo(x-w*0.2+i*w*0.12,y,x-w*0.15+i*w*0.1,y+h*0.2,x-w*0.2+i*w*0.15,y+h*0.5);
      ctx.stroke();
    }
    // Face oval cutout
    const faceG=ctx.createRadialGradient(x-w*0.05,y-h*0.05,w*0.05,x,y,w*0.35);
    faceG.addColorStop(0,sk.light); faceG.addColorStop(0.6,sk.base); faceG.addColorStop(1,sk.dark);
    ctx.fillStyle=faceG;
    ctx.beginPath(); ctx.ellipse(x,y+h*0.05,w*0.33,h*0.4,0,0,Math.PI*2); ctx.fill();
  } else {
    // Hair
    const hairG=ctx.createRadialGradient(x-w*0.1,y-h*0.4,2,x,y-h*0.2,w*0.5);
    hairG.addColorStop(0,lighten(hair,20)); hairG.addColorStop(0.4,hair); hairG.addColorStop(1,darken(hair,20));
    ctx.fillStyle=hairG;
    ctx.beginPath();
    ctx.moveTo(x-w*0.44,y-h*0.05);
    ctx.bezierCurveTo(x-w*0.46,y-h*0.55,x-w*0.2,y-h*0.62,x,y-h*0.6);
    ctx.bezierCurveTo(x+w*0.2,y-h*0.62,x+w*0.46,y-h*0.55,x+w*0.44,y-h*0.05);
    ctx.fill();
    // Hair sheen
    addHighlight(ctx,x-w*0.1,y-h*0.45,w*0.2,h*0.08,0.25);

    // Face
    const faceG=ctx.createRadialGradient(x-w*0.08,y-h*0.12,w*0.05,x,y,w*0.48);
    faceG.addColorStop(0,sk.light); faceG.addColorStop(0.5,sk.base); faceG.addColorStop(1,sk.dark);
    ctx.fillStyle=faceG;
    ctx.beginPath(); ctx.ellipse(x,y,w*0.45,h*0.5,0,0,Math.PI*2); ctx.fill();
    // Ears
    ellipseFill(ctx,x-w*0.44,y,w*0.1,h*0.13,sk.mid);
    ellipseFill(ctx,x+w*0.44,y,w*0.1,h*0.13,sk.mid);
    addShading(ctx,x+w*0.42,y,w*0.08,h*0.1,'rgba(0,0,0,0.25)',1);
  }

  // ── Facial features ──
  const eyeY=y-h*0.1;
  const eyeOffset=w*0.16;

  if(hurt){
    // X eyes
    ctx.strokeStyle='#CC0000'; ctx.lineWidth=2;
    [[-1,1]].forEach(()=>{
      [-eyeOffset,eyeOffset].forEach(ex=>{
        ctx.beginPath(); ctx.moveTo(x+ex-w*0.08,eyeY-h*0.08); ctx.lineTo(x+ex+w*0.08,eyeY+h*0.08); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(x+ex+w*0.08,eyeY-h*0.08); ctx.lineTo(x+ex-w*0.08,eyeY+h*0.08); ctx.stroke();
      });
    });
  } else {
    // Eye whites with realistic shape
    [-eyeOffset,eyeOffset].forEach(ex=>{
      ctx.fillStyle='#F5F0E8';
      ctx.beginPath(); ctx.ellipse(x+ex,eyeY,w*0.11,h*0.07,0,0,Math.PI*2); ctx.fill();
      // Iris
      const irisG=ctx.createRadialGradient(x+ex,eyeY,0,x+ex,eyeY,w*0.07);
      irisG.addColorStop(0,'#3a2800'); irisG.addColorStop(0.4,'#6a4820'); irisG.addColorStop(1,'#2a1800');
      ctx.fillStyle=irisG; ctx.beginPath(); ctx.arc(x+ex,eyeY,w*0.065,0,Math.PI*2); ctx.fill();
      // Pupil
      ctx.fillStyle='#080400'; ctx.beginPath(); ctx.arc(x+ex,eyeY,w*0.04,0,Math.PI*2); ctx.fill();
      // Catchlight
      ctx.fillStyle='rgba(255,255,255,0.85)'; ctx.beginPath(); ctx.arc(x+ex-w*0.025,eyeY-h*0.02,w*0.022,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.4)'; ctx.beginPath(); ctx.arc(x+ex+w*0.03,eyeY+h*0.02,w*0.012,0,Math.PI*2); ctx.fill();
      // Eyelid shadow
      addShading(ctx,x+ex,eyeY-h*0.02,w*0.12,h*0.04,'rgba(0,0,0,0.3)',1);
    });
    // Eyelashes top
    ctx.strokeStyle='#1a0800'; ctx.lineWidth=1.2;
    [-eyeOffset,eyeOffset].forEach(ex=>{
      ctx.beginPath(); ctx.ellipse(x+ex,eyeY-h*0.03,w*0.12,h*0.04,0,Math.PI,Math.PI*2); ctx.stroke();
    });
  }

  // Eyebrows
  ctx.fillStyle=hair||'#2a1800'; ctx.strokeStyle=hair||'#2a1800'; ctx.lineWidth=2.5;
  [-eyeOffset,eyeOffset].forEach((ex,i)=>{
    ctx.beginPath();
    ctx.moveTo(x+ex-w*0.12,eyeY-h*0.17);
    ctx.bezierCurveTo(x+ex-w*0.05,eyeY-h*0.2,x+ex+w*0.05,eyeY-h*0.19,x+ex+w*0.12,eyeY-h*0.15);
    ctx.stroke();
  });

  // Nose
  const noseY=y+h*0.08;
  ctx.strokeStyle=sk.dark; ctx.lineWidth=1.5; ctx.globalAlpha=0.6;
  ctx.beginPath(); ctx.moveTo(x-w*0.05,eyeY+h*0.05); ctx.bezierCurveTo(x-w*0.08,noseY,x-w*0.1,noseY+h*0.04,x-w*0.08,noseY+h*0.06); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x+w*0.05,eyeY+h*0.05); ctx.bezierCurveTo(x+w*0.08,noseY,x+w*0.1,noseY+h*0.04,x+w*0.08,noseY+h*0.06); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x-w*0.1,noseY+h*0.06); ctx.bezierCurveTo(x-w*0.05,noseY+h*0.1,x+w*0.05,noseY+h*0.1,x+w*0.1,noseY+h*0.06); ctx.stroke();
  ctx.globalAlpha=1;

  // Lips
  const mouthY=y+h*0.25;
  ctx.fillStyle=sk.lip;
  ctx.beginPath(); ctx.ellipse(x,mouthY,w*0.18,h*0.06,0,0,Math.PI*2); ctx.fill();
  // Upper lip shadow
  ctx.strokeStyle=darken(sk.lip,20); ctx.lineWidth=1; ctx.globalAlpha=0.7;
  ctx.beginPath(); ctx.moveTo(x-w*0.12,mouthY-h*0.01); ctx.bezierCurveTo(x-w*0.06,mouthY-h*0.04,x,mouthY-h*0.03,x+w*0.06,mouthY-h*0.04); ctx.bezierCurveTo(x+w*0.1,mouthY-h*0.03,x+w*0.12,mouthY-h*0.01,x+w*0.12,mouthY-h*0.01); ctx.stroke();
  ctx.globalAlpha=1;
  // Teeth
  ctx.fillStyle='rgba(245,240,230,0.9)';
  ctx.beginPath(); ctx.ellipse(x,mouthY+h*0.01,w*0.12,h*0.035,0,0,Math.PI*2); ctx.fill();
  // Lip highlight
  addHighlight(ctx,x-w*0.04,mouthY-h*0.01,w*0.07,h*0.025,0.4);

  // Cheeks
  ellipseFill(ctx,x-w*0.28,y+h*0.14,w*0.15,h*0.1,'rgba(200,110,90,0.18)');
  ellipseFill(ctx,x+w*0.28,y+h*0.14,w*0.15,h*0.1,'rgba(200,110,90,0.18)');

  // Overall face shading
  addShading(ctx,x+w*0.35,y+h*0.1,w*0.2,h*0.35,'rgba(0,0,0,0.18)',1);
  addShading(ctx,x,y+h*0.45,w*0.4,h*0.15,'rgba(0,0,0,0.2)',1);

  // Glasses
  if(hasGlasses){
    ctx.strokeStyle='rgba(20,10,0,0.85)';
    ctx.lineWidth=glassStyle==='rect'?2:1.8;
    ctx.globalAlpha=0.9;
    if(glassStyle==='rect'){
      ctx.strokeRect(x-eyeOffset-w*0.14,eyeY-h*0.1,w*0.27,h*0.18);
      ctx.strokeRect(x+eyeOffset-w*0.13,eyeY-h*0.1,w*0.27,h*0.18);
      ctx.beginPath(); ctx.moveTo(x-eyeOffset+w*0.13,eyeY); ctx.lineTo(x+eyeOffset-w*0.13,eyeY); ctx.stroke();
    } else {
      ctx.beginPath(); ctx.arc(x-eyeOffset,eyeY,w*0.13,0,Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.arc(x+eyeOffset,eyeY,w*0.13,0,Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x-eyeOffset+w*0.13,eyeY); ctx.lineTo(x+eyeOffset-w*0.13,eyeY); ctx.stroke();
    }
    // Temple arms
    ctx.beginPath(); ctx.moveTo(x-eyeOffset-w*0.14,eyeY); ctx.lineTo(x-w*0.52,eyeY+h*0.06); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x+eyeOffset+w*0.14,eyeY); ctx.lineTo(x+w*0.52,eyeY+h*0.06); ctx.stroke();
    // Lens sheen
    ctx.globalAlpha=0.06;
    ctx.fillStyle='white';
    ctx.beginPath(); ctx.ellipse(x-eyeOffset-w*0.03,eyeY-h*0.02,w*0.07,h*0.04,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(x+eyeOffset-w*0.03,eyeY-h*0.02,w*0.07,h*0.04,0,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
  }

  // Hurt overlay
  if(hurt){
    ctx.fillStyle='rgba(255,30,0,0.15)';
    ctx.beginPath(); ctx.ellipse(x,y,w*0.5,h*0.55,0,0,Math.PI*2); ctx.fill();
  }
  // Special glow on face
  if(special){
    ctx.strokeStyle=accentCol||'#FFD700'; ctx.lineWidth=2;
    const sg=ctx.createRadialGradient(x,y,w*0.3,x,y,w*0.7);
    sg.addColorStop(0,'transparent'); sg.addColorStop(1,`${accentCol||'#FFD700'}44`);
    ctx.fillStyle=sg; ctx.beginPath(); ctx.ellipse(x,y,w*0.7,h*0.75,0,0,Math.PI*2); ctx.fill();
  }
}

// ── BODY — realistic muscle/cloth shading ─────────────────
function drawBody(ctx,x,y,w,h,clothes,sk,state,pose){
  const {shirt,pants,belt,boots,shirtD,shirtL}=clothes;

  // TORSO
  const torsoG=ctx.createLinearGradient(x-w*0.5,y,x+w*0.5,y);
  torsoG.addColorStop(0,shirtD||darken(shirt,20));
  torsoG.addColorStop(0.3,shirtL||lighten(shirt,10));
  torsoG.addColorStop(0.7,shirt);
  torsoG.addColorStop(1,shirtD||darken(shirt,25));
  ctx.fillStyle=torsoG;
  ctx.beginPath(); ctx.roundRect(x-w*0.5,y,w,h,6); ctx.fill();
  // Chest shading
  addShading(ctx,x,y+h*0.3,w*0.4,h*0.3,'rgba(0,0,0,0.15)',1);
  addHighlight(ctx,x-w*0.1,y+h*0.1,w*0.25,h*0.15,0.12);
  // Collar
  ctx.fillStyle=shirtD||darken(shirt,20);
  ctx.beginPath(); ctx.moveTo(x-w*0.12,y); ctx.lineTo(x,y+h*0.15); ctx.lineTo(x+w*0.12,y); ctx.closePath(); ctx.fill();

  // BELT
  const belG=ctx.createLinearGradient(x-w*0.5,y+h,x+w*0.5,y+h);
  belG.addColorStop(0,darken(belt,20)); belG.addColorStop(0.5,belt); belG.addColorStop(1,darken(belt,20));
  ctx.fillStyle=belG; ctx.beginPath(); ctx.roundRect(x-w*0.5,y+h,w,h*0.12,2); ctx.fill();
  // Buckle
  const buckG=ctx.createRadialGradient(x,y+h+h*0.06,0,x,y+h+h*0.06,w*0.09);
  buckG.addColorStop(0,'#FFD700'); buckG.addColorStop(0.5,'#C9A84C'); buckG.addColorStop(1,'#8B6914');
  ctx.fillStyle=buckG; ctx.beginPath(); ctx.roundRect(x-w*0.09,y+h+h*0.01,w*0.18,h*0.1,2); ctx.fill();

  // ARMS
  const armPoseL=pose.armL, armPoseR=pose.armR;
  drawArm(ctx,x-w*0.5,y+h*0.05,w*0.22,h*0.85,shirt,sk,armPoseL,'left');
  drawArm(ctx,x+w*0.5,y+h*0.05,w*0.22,h*0.85,shirt,sk,armPoseR,'right');

  // LEGS
  drawLeg(ctx,x-w*0.22,y+h*1.12,w*0.38,h*1.1,pants,boots,pose.legL,'left');
  drawLeg(ctx,x+w*0.22,y+h*1.12,w*0.38,h*1.1,pants,boots,pose.legR,'right');
}

function drawArm(ctx,x,y,w,h,shirt,sk,pose,side){
  if(pose==='idle'){
    const aG=ctx.createLinearGradient(x,y,x+w*(side==='right'?1:-1),y);
    aG.addColorStop(0,darken(shirt,15)); aG.addColorStop(0.5,shirt); aG.addColorStop(1,darken(shirt,20));
    ctx.fillStyle=aG;
    if(side==='right'){
      ctx.beginPath(); ctx.roundRect(x,y,w,h,w*0.4); ctx.fill();
      // Hand
      const hG=ctx.createRadialGradient(x+w*0.5,y+h+w*0.3,0,x+w*0.5,y+h+w*0.3,w*0.5);
      hG.addColorStop(0,sk.light); hG.addColorStop(1,sk.mid);
      ctx.fillStyle=hG; ctx.beginPath(); ctx.ellipse(x+w*0.5,y+h+w*0.2,w*0.4,w*0.45,0,0,Math.PI*2); ctx.fill();
    } else {
      ctx.beginPath(); ctx.roundRect(x-w,y,w,h,w*0.4); ctx.fill();
      const hG=ctx.createRadialGradient(x-w*0.5,y+h+w*0.3,0,x-w*0.5,y+h+w*0.3,w*0.5);
      hG.addColorStop(0,sk.light); hG.addColorStop(1,sk.mid);
      ctx.fillStyle=hG; ctx.beginPath(); ctx.ellipse(x-w*0.5,y+h+w*0.2,w*0.4,w*0.45,0,0,Math.PI*2); ctx.fill();
    }
  } else if(pose==='punch'){
    // Extended horizontal punch
    const len=w*3.5;
    const aG=ctx.createLinearGradient(x,y+h*0.3,x+len*(side==='right'?1:-1),y+h*0.3);
    aG.addColorStop(0,darken(shirt,20)); aG.addColorStop(0.5,shirt); aG.addColorStop(1,shirt);
    ctx.fillStyle=aG;
    if(side==='right'){
      ctx.beginPath(); ctx.roundRect(x,y+h*0.2,len,w,w*0.4); ctx.fill();
      const hG=ctx.createRadialGradient(x+len+w*0.3,y+h*0.2+w*0.4,0,x+len+w*0.3,y+h*0.2+w*0.4,w*0.6);
      hG.addColorStop(0,sk.light); hG.addColorStop(1,sk.dark);
      ctx.fillStyle=hG; ctx.beginPath(); ctx.ellipse(x+len+w*0.2,y+h*0.2+w*0.35,w*0.55,w*0.55,0,0,Math.PI*2); ctx.fill();
      // Knuckle detail
      for(let i=0;i<4;i++){
        ctx.fillStyle='rgba(0,0,0,0.15)'; ctx.beginPath();
        ctx.arc(x+len+w*0.1+i*w*0.15,y+h*0.2,w*0.07,0,Math.PI*2); ctx.fill();
      }
    } else {
      ctx.beginPath(); ctx.roundRect(x-len-w,y+h*0.2,len,w,w*0.4); ctx.fill();
      const hG=ctx.createRadialGradient(x-len-w*1.3,y+h*0.2+w*0.4,0,x-len-w*1.3,y+h*0.2+w*0.4,w*0.6);
      hG.addColorStop(0,sk.light); hG.addColorStop(1,sk.dark);
      ctx.fillStyle=hG; ctx.beginPath(); ctx.ellipse(x-len-w*1.2,y+h*0.2+w*0.35,w*0.55,w*0.55,0,0,Math.PI*2); ctx.fill();
    }
  } else if(pose==='raised'){
    // Arm raised up/guard
    const aG2=ctx.createLinearGradient(x,y,x,y-h);
    aG2.addColorStop(0,shirt); aG2.addColorStop(1,darken(shirt,20));
    ctx.fillStyle=aG2;
    if(side==='right'){
      ctx.save(); ctx.translate(x+w*0.4,y+h*0.3); ctx.rotate(-Math.PI/4);
      ctx.beginPath(); ctx.roundRect(-w*0.4,-h*0.5,w,h,w*0.4); ctx.fill();
      ctx.restore();
    } else {
      ctx.save(); ctx.translate(x-w*0.4,y+h*0.3); ctx.rotate(Math.PI/4);
      ctx.beginPath(); ctx.roundRect(-w*0.6,-h*0.5,w,h,w*0.4); ctx.fill();
      ctx.restore();
    }
  } else if(pose==='wide'){
    // Arms spread for special
    const aG3=ctx.createLinearGradient(x,y+h*0.3,x+(side==='right'?w*4:-w*4),y+h*0.3);
    aG3.addColorStop(0,shirt); aG3.addColorStop(1,darken(shirt,15));
    ctx.fillStyle=aG3;
    const dir=side==='right'?1:-1;
    ctx.save(); ctx.translate(x,y+h*0.3); ctx.rotate(dir*0.4);
    ctx.beginPath(); ctx.roundRect(side==='right'?0:-w*3.5,-w*0.4,w*3.5,w,w*0.4); ctx.fill();
    ctx.restore();
    // Hand glow
    const hx=x+(side==='right'?w*3.2:-w*3.2);
    const hG=ctx.createRadialGradient(hx,y+h*0.6,0,hx,y+h*0.6,w*0.8);
    hG.addColorStop(0,sk.light); hG.addColorStop(1,sk.mid);
    ctx.fillStyle=hG; ctx.beginPath(); ctx.ellipse(hx,y+h*0.6,w*0.5,w*0.5,0,0,Math.PI*2); ctx.fill();
  }
}

function drawLeg(ctx,x,y,w,h,pants,boots,pose,side){
  if(pose==='idle'){
    const lG=ctx.createLinearGradient(x-w*0.5,y,x+w*0.5,y);
    lG.addColorStop(0,darken(pants,20)); lG.addColorStop(0.4,pants); lG.addColorStop(1,darken(pants,15));
    ctx.fillStyle=lG; ctx.beginPath(); ctx.roundRect(x-w*0.5,y,w,h,w*0.4); ctx.fill();
    addShading(ctx,x+w*0.2,y+h*0.5,w*0.2,h*0.3,'rgba(0,0,0,0.15)',1);
    // Boot
    const bG=ctx.createLinearGradient(x-w*0.55,y+h,x+w*0.55,y+h);
    bG.addColorStop(0,darken(boots,20)); bG.addColorStop(0.5,boots); bG.addColorStop(1,darken(boots,20));
    ctx.fillStyle=bG; ctx.beginPath(); ctx.roundRect(x-w*0.55,y+h,w*1.1,h*0.22,4); ctx.fill();
    addHighlight(ctx,x-w*0.1,y+h+h*0.05,w*0.3,h*0.05,0.2);
  } else if(pose==='kick'){
    // Horizontal kick
    ctx.save(); ctx.translate(x,y); ctx.rotate(side==='right'?-0.4:0.4);
    const lG=ctx.createLinearGradient(0,0,w*3.5,0);
    lG.addColorStop(0,pants); lG.addColorStop(1,darken(pants,15));
    ctx.fillStyle=lG; ctx.beginPath(); ctx.roundRect(-w*0.5,0,w*3.5,w,w*0.4); ctx.fill();
    // Boot at end
    ctx.fillStyle=boots; ctx.beginPath(); ctx.roundRect(w*2.8,-w*0.1,w*1.0,w*1.1,4); ctx.fill();
    addHighlight(ctx,w*3.0,w*0.1,w*0.2,w*0.15,0.3);
    ctx.restore();
    // Standing leg
    const lG2=ctx.createLinearGradient(x-w*0.5,y,x+w*0.5,y);
    lG2.addColorStop(0,darken(pants,25)); lG2.addColorStop(0.5,pants); lG2.addColorStop(1,darken(pants,15));
    ctx.fillStyle=lG2; ctx.beginPath(); ctx.roundRect(x-w*0.5,y,w,h*0.7,w*0.4); ctx.fill();
    ctx.fillStyle=boots; ctx.beginPath(); ctx.roundRect(x-w*0.55,y+h*0.7,w*1.1,h*0.22,4); ctx.fill();
  }
}

// ── Color helpers ─────────────────────────────────────────
function lighten(hex,pct){
  const n=parseInt(hex.slice(1),16);
  const r=Math.min(255,((n>>16)&0xff)+pct*2.55|0);
  const g=Math.min(255,((n>>8)&0xff)+pct*2.55|0);
  const b=Math.min(255,(n&0xff)+pct*2.55|0);
  return `rgb(${r},${g},${b})`;
}
function darken(hex,pct){
  if(!hex||!hex.startsWith('#')) return hex;
  const n=parseInt(hex.slice(1),16);
  const r=Math.max(0,((n>>16)&0xff)-pct*2.55|0);
  const g=Math.max(0,((n>>8)&0xff)-pct*2.55|0);
  const b=Math.max(0,(n&0xff)-pct*2.55|0);
  return `rgb(${r},${g},${b})`;
}

// ── Per-character full sprite ──────────────────────────────
function drawFighter(ctx,fx,fy,charIdx,state,facingRight,tick){
  ctx.save();
  ctx.translate(fx,fy);
  if(!facingRight) ctx.scale(-1,1);

  // Ground shadow
  const sg=ctx.createRadialGradient(0,4,2,0,4,28);
  sg.addColorStop(0,'rgba(0,0,0,0.5)'); sg.addColorStop(1,'transparent');
  ctx.fillStyle=sg; ctx.beginPath(); ctx.ellipse(0,4,28,8,0,0,Math.PI*2); ctx.fill();

  const bob=state==='idle'?Math.sin(tick*0.07)*2:0;
  ctx.translate(0,bob);

  const hurt=state==='hurt', special=state==='special';
  const doPunch=state==='punch', doKick=state==='kick';

  // Special aura
  if(special){
    const c=CHARS[charIdx];
    const aura=ctx.createRadialGradient(0,-55,10,0,-55,80);
    aura.addColorStop(0,c.accent+'55'); aura.addColorStop(1,'transparent');
    ctx.fillStyle=aura; ctx.beginPath(); ctx.arc(0,-55,80,0,Math.PI*2); ctx.fill();
    for(let i=0;i<10;i++){
      const a=tick*0.05+i*Math.PI/5;
      ctx.globalAlpha=0.6+Math.sin(tick*0.1+i)*0.3;
      ctx.fillStyle=c.accent;
      ctx.beginPath(); ctx.arc(Math.cos(a)*52,Math.sin(a)*36-55,3,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=1;
  }

  // Poses
  const punchPose={armL:'idle',armR:doPunch?'punch':'idle',legL:'idle',legR:'idle'};
  const kickPose={armL:'raised',armR:'raised',legL:'idle',legR:doKick?'kick':'idle'};
  const specialPose={armL:'wide',armR:'wide',legL:'idle',legR:'idle'};
  const idlePose={armL:'idle',armR:'idle',legL:'idle',legR:'idle'};
  const pose=doPunch?punchPose:doKick?kickPose:special?specialPose:idlePose;

  // Draw per character
  switch(charIdx){
    case 0: drawFaruqal(ctx,state,pose,tick); break;
    case 1: drawSyida(ctx,state,pose,tick); break;
    case 2: drawIka(ctx,state,pose,tick); break;
    case 3: drawFaisal(ctx,state,pose,tick); break;
    case 4: drawIkmal(ctx,state,pose,tick); break;
  }
  ctx.restore();
}

function drawFaruqal(ctx,state,pose,tick){
  const sk=SKIN.faruqal;
  const clothes={shirt:'#1e2d5a',shirtD:'#0e1830',shirtL:'#2e4070',pants:'#111828',belt:'#2a2010',boots:'#1a1a1a'};
  drawBody(ctx,0,-28,46,46,clothes,sk,state,pose);
  drawRealisticHead(ctx,{x:0,y:-82,w:38,h:38,sk,hair:'#0e0a06',hasGlasses:false,hurt:state==='hurt',special:state==='special',accentCol:'#4A90D9'});
  // Extra chubby cheek volume
  ellipseFill(ctx,-22,-78,10,8,'rgba(160,80,50,0.2)');
  ellipseFill(ctx,22,-78,10,8,'rgba(160,80,50,0.2)');
}
function drawSyida(ctx,state,pose,tick){
  const sk=SKIN.syida;
  const clothes={shirt:'#1e2d5a',shirtD:'#0e1830',shirtL:'#2e4070',pants:'#111828',belt:'#4a3a20',boots:'#1a1010'};
  drawBody(ctx,0,-28,40,44,clothes,sk,state,pose);
  drawRealisticHead(ctx,{x:0,y:-82,w:34,h:36,sk,hair:'#100808',hasHijab:true,hijabCol:'#D8CFA8',hijabAccent:'#E8E0C0',hurt:state==='hurt',special:state==='special',accentCol:'#E8C4A0',hasGlasses:true,glassStyle:'round'});
}
function drawIka(ctx,state,pose,tick){
  const sk=SKIN.ika;
  const clothes={shirt:'#AA1122',shirtD:'#780a15',shirtL:'#CC2233',pants:'#181820',belt:'#3a2a10',boots:'#1a1010'};
  drawBody(ctx,0,-28,41,44,clothes,sk,state,pose);
  drawRealisticHead(ctx,{x:0,y:-82,w:34,h:36,sk,hair:'#0a0608',hasHijab:true,hijabCol:'#5a1018',hijabAccent:'#7a2028',hurt:state==='hurt',special:state==='special',accentCol:'#CC3344',hasGlasses:true,glassStyle:'round'});
}
function drawFaisal(ctx,state,pose,tick){
  const sk=SKIN.faisal;
  const clothes={shirt:'#1e2d5a',shirtD:'#0e1830',shirtL:'#2e4070',pants:'#111828',belt:'#3a2a10',boots:'#1a1a1a'};
  drawBody(ctx,0,-28,40,46,clothes,sk,state,pose);
  drawRealisticHead(ctx,{x:0,y:-82,w:36,h:36,sk,hair:'#0a0806',hasGlasses:true,glassStyle:'rect',hurt:state==='hurt',special:state==='special',accentCol:'#C9A84C'});
  // Watch detail
  if(pose.armR==='idle'){
    ctx.fillStyle='#333'; ctx.beginPath(); ctx.roundRect(22,-10,10,6,2); ctx.fill();
    ctx.fillStyle='#888'; ctx.fillRect(24,-9,6,4);
  }
}
function drawIkmal(ctx,state,pose,tick){
  const sk=SKIN.ikmal;
  const clothes={shirt:'#1a7a40',shirtD:'#0e4f28',shirtL:'#2aaa58',pants:'#0e3a20',belt:'#8B6914',boots:'#1a3a10'};
  drawBody(ctx,0,-28,42,46,clothes,sk,state,pose);
  // Sash
  ctx.globalAlpha=0.8;
  const sg2=ctx.createLinearGradient(-21,-28,21,-28+46);
  sg2.addColorStop(0,'#0e4f28'); sg2.addColorStop(1,'#2aaa58');
  ctx.fillStyle=sg2;
  ctx.beginPath(); ctx.moveTo(-21,-28); ctx.lineTo(21,-28); ctx.lineTo(-21,18); ctx.closePath(); ctx.fill();
  ctx.globalAlpha=1;
  drawRealisticHead(ctx,{x:0,y:-82,w:36,h:36,sk,hair:'#0a1208',hasGlasses:false,hurt:state==='hurt',special:state==='special',accentCol:'#2ECC71'});
  // Scar
  ctx.strokeStyle='rgba(180,100,80,0.5)'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(10,-90); ctx.lineTo(14,-80); ctx.stroke();
}

// ─────────────────────────────────────────────────────────
// CHARACTER SELECT
// ─────────────────────────────────────────────────────────
function goSel(){
  p1i=null; p2i=null;
  buildCards();
  document.getElementById('p1st').textContent='P1 — CHOOSE FIGHTER';
  document.getElementById('p2st').textContent='P2 — CHOOSE FIGHTER';
  document.getElementById('bFight').style.display='none';
  document.getElementById('ov').classList.remove('show');
  cancelAnimationFrame(raf);
  showScr('ss');
}

function buildCards(){
  const grid=document.getElementById('cg');
  grid.innerHTML='';
  CHARS.forEach((c,i)=>{
    const card=document.createElement('div');
    card.className='cc'; card.id='cc'+i;
    const pc=document.createElement('canvas');
    pc.width=140; pc.height=135;
    pc.style.cssText='width:140px;height:135px;display:block;';
    drawPortrait(pc,i,c);
    const info=document.createElement('div');
    info.className='ci';
    info.innerHTML=`<div class="cn" style="color:${c.accent};text-shadow:0 0 8px ${c.glow};">${c.icon} ${c.name}</div>
      <div class="ct" style="color:${c.glow}88;">${c.title}</div>`;
    card.appendChild(pc); card.appendChild(info);
    card.onclick=()=>pickChar(i);
    grid.appendChild(card);
  });
}

function drawPortrait(canvas,charIdx,c){
  const ctx=canvas.getContext('2d');
  const W=canvas.width,H=canvas.height;
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,c.accent+'28'); bg.addColorStop(1,'#000');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);
  const vig=ctx.createRadialGradient(W/2,H/2,10,W/2,H/2,90);
  vig.addColorStop(0,'transparent'); vig.addColorStop(1,'rgba(0,0,0,0.65)');
  ctx.fillStyle=vig; ctx.fillRect(0,0,W,H);
  ctx.save(); ctx.scale(1.1,1.1);
  drawFighter(ctx,W/2/1.1,(H+18)/1.1,charIdx,'idle',true,60);
  ctx.restore();
  const ng=ctx.createLinearGradient(0,H-26,0,H);
  ng.addColorStop(0,'transparent'); ng.addColorStop(1,c.accent+'55');
  ctx.fillStyle=ng; ctx.fillRect(0,H-26,W,26);
}

function pickChar(i){
  if(p1i===null){p1i=i;}
  else if(p2i===null&&i!==p1i){p2i=i;}
  else if(i===p1i){p1i=null;}
  else if(i===p2i){p2i=null;}
  else{p2i=i;}
  document.querySelectorAll('.cc').forEach((card,j)=>{
    card.classList.remove('p1s','p2s');
    card.querySelectorAll('.badge').forEach(b=>b.remove());
    if(j===p1i){card.classList.add('p1s');const b=document.createElement('div');b.className='badge p1b';b.textContent='P1';card.appendChild(b);}
    if(j===p2i){card.classList.add('p2s');const b=document.createElement('div');b.className='badge p2b';b.textContent='P2';card.appendChild(b);}
  });
  document.getElementById('p1st').innerHTML=p1i!==null?`<span style="color:${CHARS[p1i].accent}">${CHARS[p1i].icon} P1: ${CHARS[p1i].name}</span>`:'P1 — CHOOSE FIGHTER';
  document.getElementById('p2st').innerHTML=p2i!==null?`<span style="color:${CHARS[p2i].accent}">${CHARS[p2i].icon} P2: ${CHARS[p2i].name}</span>`:'P2 — CHOOSE FIGHTER';
  document.getElementById('bFight').style.display=(p1i!==null&&p2i!==null)?'block':'none';
}

// ─────────────────────────────────────────────────────────
// GAME ENGINE
// ─────────────────────────────────────────────────────────
function showScr(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function startFight(){document.getElementById('ov').classList.remove('show');showScr('gs2');initGame();}

function initGame(){
  const canvas=document.getElementById('gc');
  const isMob=window.innerWidth<=720;
  const scale=Math.min(window.innerWidth/GW,(window.innerHeight-(isMob?90:0))/GH,2);
  canvas.width=GW; canvas.height=GH;
  canvas.style.width=GW*scale+'px'; canvas.style.height=GH*scale+'px';
  gs={canvas,ctx:canvas.getContext('2d'),timer:99,tF:0,tick:0,blood:[],hitFX:[],
    p1:{x:110,y:FLOOR,vy:0,hp:100,mhp:100,face:1,ci:p1i,atkCD:0,hurtT:0,punch:0,kick:0,specCD:0,specA:0,blocking:0,jumping:false,wins:0,state:'idle'},
    p2:{x:GW-110,y:FLOOR,vy:0,hp:100,mhp:100,face:-1,ci:p2i,atkCD:0,hurtT:0,punch:0,kick:0,specCD:0,specA:0,blocking:0,jumping:false,wins:0,state:'idle'},
    done:false,flash:50};
  cancelAnimationFrame(raf);
  gameLoop();
  showMsg('FIGHT!','',false);
  setTimeout(()=>document.getElementById('ov').classList.remove('show'),900);
}

function gameLoop(){updateG();renderG();raf=requestAnimationFrame(gameLoop);}

function updateG(){
  if(gs.done) return;
  const{p1,p2}=gs; gs.tick++; gs.tF++;
  if(gs.tF>=60){gs.tF=0;gs.timer--;if(gs.timer<=0)endRound();}
  [p1,p2].forEach(p=>{
    if(p.atkCD>0)p.atkCD--;if(p.hurtT>0)p.hurtT--;if(p.punch>0)p.punch--;
    if(p.kick>0)p.kick--;if(p.specCD>0)p.specCD--;if(p.specA>0)p.specA--;if(p.blocking>0)p.blocking--;
    p.state=p.hurtT>0?'hurt':p.specA>0?'special':p.punch>0?'punch':p.kick>0?'kick':'idle';
  });
  if(!p1.hurtT){
    if(keys['a']&&p1.x>45)p1.x-=3;if(keys['d']&&p1.x<GW-45)p1.x+=3;
    if(keys['w']&&!p1.jumping){p1.vy=JUMP;p1.jumping=true;}
    if(keys['s'])p1.blocking=5;
    if(keys['f']&&p1.atkCD===0){p1.punch=15;p1.atkCD=22;doHit(p1,p2,18,'punch');}
    if(keys['g']&&p1.atkCD===0){p1.kick=16;p1.atkCD=28;doHit(p1,p2,24,'kick');}
    if(keys['q']&&p1.specCD===0){p1.specA=28;p1.specCD=140;doHit(p1,p2,38,'special');}
  }
  if(!p2.hurtT){
    if(keys['ArrowLeft']&&p2.x>45)p2.x-=3;if(keys['ArrowRight']&&p2.x<GW-45)p2.x+=3;
    if(keys['ArrowUp']&&!p2.jumping){p2.vy=JUMP;p2.jumping=true;}
    if(keys['ArrowDown'])p2.blocking=5;
    if(keys['l']&&p2.atkCD===0){p2.punch=15;p2.atkCD=22;doHit(p2,p1,18,'punch');}
    if(keys['.']&&p2.atkCD===0){p2.kick=16;p2.atkCD=28;doHit(p2,p1,24,'kick');}
    if(keys['p']&&p2.specCD===0){p2.specA=28;p2.specCD=140;doHit(p2,p1,38,'special');}
  }
  [p1,p2].forEach(p=>{
    p.vy+=GRAV;p.y+=p.vy;
    if(p.y>=FLOOR){p.y=FLOOR;p.vy=0;p.jumping=false;}
    if(p.state==='idle')p.face=p.x<(p===p1?p2.x:p1.x)?1:-1;
  });
  gs.blood=gs.blood.filter(b=>{b.x+=b.vx;b.y+=b.vy;b.vy+=0.35;b.life--;return b.life>0;});
  gs.hitFX=gs.hitFX.filter(f=>{f.life--;return f.life>0;});
}

function doHit(atk,def,baseDmg,type){
  const dist=Math.abs(atk.x-def.x);
  const range=type==='special'?160:type==='kick'?100:80;
  if(dist>range)return;
  const blocked=def.blocking>0,dmg=blocked?Math.ceil(baseDmg*0.15):baseDmg;
  def.hp=Math.max(0,def.hp-dmg);
  if(!blocked){def.hurtT=22;const dir=def.x>atk.x?1:-1;def.x=Math.max(45,Math.min(GW-45,def.x+dir*22));}
  else def.hurtT=5;
  if(!blocked&&dmg>5)for(let i=0;i<(type==='special'?18:8);i++)gs.blood.push({x:def.x,y:def.y-55,vx:(Math.random()-0.5)*10,vy:Math.random()*-8,life:35+Math.random()*15,r:2+Math.random()*3.5});
  const msgs={punch:['POW!','CRACK!','BAM!'],kick:['KICK!','SMASH!','BREAK!'],special:['BRUTALITY!','FINISH HIM!','FATALITY?']};
  gs.hitFX.push({x:(atk.x+def.x)/2,y:def.y-95,text:msgs[type][Math.floor(Math.random()*3)],color:type==='special'?CHARS[atk.ci].accent:'#fff',life:55,max:55,sz:type==='special'?15:10});
  if(def.hp<=0)endRound();
}

function endRound(){
  if(gs.done)return; gs.done=true;
  const{p1,p2}=gs; let winner=null;
  if(!(p1.hp<=0&&p2.hp<=0)){if(p2.hp>p1.hp||p1.hp<=0){p2.wins++;winner=p2;}else{p1.wins++;winner=p1;}}
  setTimeout(()=>showMsg(winner?`${CHARS[winner.ci].name} WINS!`:'DRAW!',gs.timer<=0?'TIME OVER':'K.O.',true,`${CHARS[p1.ci].icon} ${p1.wins} — ${p2.wins} ${CHARS[p2.ci].icon}`),1500);
}

function showMsg(t,s,btns,sc=''){
  document.getElementById('ovT').textContent=t;document.getElementById('ovS').textContent=s;
  document.getElementById('ovSc').textContent=sc;document.getElementById('ovBtns').style.display=btns?'flex':'none';
  document.getElementById('ov').classList.add('show');
}

function renderG(){
  const{ctx,p1,p2,blood,hitFX,timer,tick}=gs;
  const si=(p1.ci+p2.ci)%3;
  const bgs=[['#0d0200','#1a0600'],['#00060d','#001520'],['#080010','#140025']];
  const bg=ctx.createLinearGradient(0,0,0,GH);
  bg.addColorStop(0,bgs[si][0]);bg.addColorStop(1,bgs[si][1]);
  ctx.fillStyle=bg;ctx.fillRect(0,0,GW,GH);
  drawBG(ctx,tick);
  ctx.fillStyle='#140800';ctx.fillRect(0,FLOOR+40,GW,GH);
  for(let x=0;x<GW;x+=50){ctx.fillStyle=x%100===0?'#1c0c00':'#160800';ctx.fillRect(x,FLOOR+40,48,GH);ctx.fillStyle='#080400';ctx.fillRect(x+48,FLOOR+40,2,GH);}
  const fe=ctx.createLinearGradient(0,FLOOR+38,0,FLOOR+52);fe.addColorStop(0,'rgba(200,60,0,0.4)');fe.addColorStop(1,'transparent');
  ctx.fillStyle=fe;ctx.fillRect(0,FLOOR+38,GW,14);ctx.fillStyle='#331200';ctx.fillRect(0,FLOOR+38,GW,2);
  blood.forEach(b=>{if(b.y>=FLOOR+38){ctx.fillStyle='rgba(110,0,0,0.5)';ctx.beginPath();ctx.arc(b.x,FLOOR+41,b.r*2,0,Math.PI*2);ctx.fill();}});
  blood.forEach(b=>{if(b.y<FLOOR+38){ctx.globalAlpha=b.life/50;ctx.fillStyle='#BB0000';ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;}});
  drawFighter(ctx,p1.x,p1.y,p1.ci,p1.state,p1.x<p2.x,tick);
  drawFighter(ctx,p2.x,p2.y,p2.ci,p2.state,p2.x<p1.x,tick);
  hitFX.forEach(f=>{ctx.save();const a=f.life/f.max;ctx.translate(f.x,f.y-(1-a)*18);ctx.globalAlpha=a;ctx.fillStyle=f.color;ctx.shadowColor=f.color;ctx.shadowBlur=14;ctx.font=`bold ${f.sz}px 'Cinzel Decorative',serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(f.text,0,0);ctx.restore();ctx.shadowBlur=0;});
  drawHUD(ctx,p1,p2,timer);
  if(gs.flash>0){gs.flash--;ctx.globalAlpha=gs.flash/50*0.28;ctx.fillStyle='#CC0000';ctx.fillRect(0,0,GW,GH);ctx.globalAlpha=1;}
}

function drawBG(ctx,tick){
  const torches=[65,GW-65,GW/2];
  torches.forEach(tx=>{
    ctx.fillStyle='#251000';ctx.fillRect(tx-3,52,6,24);ctx.fillStyle='#180a00';ctx.fillRect(tx-7,74,14,5);
    const fl=Math.sin(tick*0.18+tx)*3;
    const fg=ctx.createRadialGradient(tx,50+fl,1,tx,50+fl,22);
    fg.addColorStop(0,'rgba(255,210,60,0.95)');fg.addColorStop(0.4,'rgba(255,80,10,0.6)');fg.addColorStop(1,'transparent');
    ctx.fillStyle=fg;ctx.beginPath();ctx.ellipse(tx,50+fl,8+fl,18,0,0,Math.PI*2);ctx.fill();
    const gp=ctx.createRadialGradient(tx,FLOOR+40,5,tx,FLOOR+40,110);
    gp.addColorStop(0,'rgba(255,80,0,0.07)');gp.addColorStop(1,'transparent');
    ctx.fillStyle=gp;ctx.fillRect(tx-110,FLOOR,220,GH);
  });
  for(let px2=55;px2<GW;px2+=130){
    ctx.fillStyle='rgba(8,3,0,0.75)';ctx.fillRect(px2-13,38,26,FLOOR-38+40);
    ctx.fillStyle='rgba(22,10,0,0.65)';ctx.fillRect(px2-17,38,34,10);ctx.fillRect(px2-17,FLOOR+36,34,10);
    ctx.fillStyle='rgba(35,16,0,0.45)';ctx.fillRect(px2-2,48,4,FLOOR-48+36);
  }
  ctx.fillStyle='rgba(10,4,0,0.55)';ctx.beginPath();ctx.moveTo(0,FLOOR+38);
  for(let x=0;x<=GW;x+=70)ctx.lineTo(x,FLOOR-35+Math.sin(x*0.04+tick*0.005)*20+38);
  ctx.lineTo(GW,FLOOR+38);ctx.closePath();ctx.fill();
}

function drawHUD(ctx,p1,p2,timer){
  const PAD=12,BW=220,BH=20,HY=10,c1=CHARS[p1.ci],c2=CHARS[p2.ci];
  ctx.fillStyle='rgba(0,0,0,0.72)';ctx.fillRect(PAD,HY,BW+2,BH+2);
  const p1p=p1.hp/p1.mhp,p1c=p1p>0.5?'#00CC44':p1p>0.25?'#FFD700':'#CC0000';
  const pg1=ctx.createLinearGradient(PAD,0,PAD+BW*p1p,0);pg1.addColorStop(0,p1c);pg1.addColorStop(1,p1c+'77');
  ctx.fillStyle=pg1;ctx.fillRect(PAD+1,HY+1,Math.floor(BW*p1p),BH);ctx.strokeStyle=c1.accent;ctx.lineWidth=1.5;ctx.strokeRect(PAD,HY,BW+2,BH+2);
  const p2x2=GW-PAD-BW-2;ctx.fillStyle='rgba(0,0,0,0.72)';ctx.fillRect(p2x2,HY,BW+2,BH+2);
  const p2p=p2.hp/p2.mhp,p2c=p2p>0.5?'#00CC44':p2p>0.25?'#FFD700':'#CC0000';
  const pg2=ctx.createLinearGradient(p2x2+BW,0,p2x2+BW-BW*p2p,0);pg2.addColorStop(0,p2c);pg2.addColorStop(1,p2c+'77');
  ctx.fillStyle=pg2;ctx.fillRect(p2x2+1+Math.floor(BW*(1-p2p)),HY+1,Math.floor(BW*p2p),BH);ctx.strokeStyle=c2.accent;ctx.lineWidth=1.5;ctx.strokeRect(p2x2,HY,BW+2,BH+2);
  ctx.shadowBlur=6;ctx.fillStyle=c1.accent;ctx.shadowColor=c1.accent;ctx.font=`bold 9px 'Cinzel',serif`;ctx.textAlign='left';ctx.fillText(`${c1.icon} ${c1.name}`,PAD,HY+32);
  ctx.fillStyle=c2.accent;ctx.shadowColor=c2.accent;ctx.textAlign='right';ctx.fillText(`${c2.name} ${c2.icon}`,GW-PAD,HY+32);ctx.shadowBlur=0;
  const tc=timer>30?'#C9A84C':timer>10?'#FF6B00':'#CC0000';
  ctx.fillStyle='rgba(0,0,0,0.82)';ctx.fillRect(GW/2-25,HY-2,50,26);ctx.strokeStyle=tc;ctx.lineWidth=1.5;ctx.strokeRect(GW/2-25,HY-2,50,26);
  ctx.fillStyle=tc;ctx.shadowColor=tc;ctx.shadowBlur=10;ctx.font=`bold 18px 'Cinzel Decorative',serif`;ctx.textAlign='center';ctx.fillText(String(timer).padStart(2,'0'),GW/2,HY+17);ctx.shadowBlur=0;
  for(let i=0;i<3;i++){ctx.fillStyle=i<p1.wins?'#FFD700':'#221000';ctx.beginPath();ctx.arc(PAD+8+i*14,HY+39,5,0,Math.PI*2);ctx.fill();if(i<p1.wins){ctx.strokeStyle='#FF6B00';ctx.lineWidth=1;ctx.stroke();}}
  for(let i=0;i<3;i++){ctx.fillStyle=i<p2.wins?'#FFD700':'#221000';ctx.beginPath();ctx.arc(GW-PAD-8-i*14,HY+39,5,0,Math.PI*2);ctx.fill();if(i<p2.wins){ctx.strokeStyle='#FF6B00';ctx.lineWidth=1;ctx.stroke();}}
  const s1=1-p1.specCD/140;ctx.fillStyle='#100500';ctx.fillRect(PAD,HY+44,BW/2,5);
  const sg1=ctx.createLinearGradient(PAD,0,PAD+BW/2*s1,0);sg1.addColorStop(0,c1.accent);sg1.addColorStop(1,c1.accent+'33');
  ctx.fillStyle=sg1;ctx.fillRect(PAD,HY+44,Math.floor(BW/2*s1),5);ctx.font=`5px 'Cinzel',serif`;ctx.textAlign='left';ctx.fillStyle='#3a2000';ctx.fillText('SPECIAL',PAD,HY+56);
  const s2=1-p2.specCD/140,sx=GW-PAD-BW/2;ctx.fillStyle='#100500';ctx.fillRect(sx,HY+44,BW/2,5);
  const sg2=ctx.createLinearGradient(sx+BW/2,0,sx+BW/2-BW/2*s2,0);sg2.addColorStop(0,c2.accent);sg2.addColorStop(1,c2.accent+'33');
  ctx.fillStyle=sg2;ctx.fillRect(sx+Math.floor(BW/2*(1-s2)),HY+44,Math.floor(BW/2*s2),5);ctx.textAlign='right';ctx.fillStyle='#3a2000';ctx.fillText('SPECIAL',GW-PAD,HY+56);
}

// ─────────────────────────────────────────────────────────
// INPUT
// ─────────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{keys[e.key]=true;if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key))e.preventDefault();});
document.addEventListener('keyup',e=>{keys[e.key]=false;});
function mb(id,k){const el=document.getElementById(id);if(!el)return;el.addEventListener('touchstart',e=>{e.preventDefault();keys[k]=true;el.classList.add('pr');},{passive:false});el.addEventListener('touchend',e=>{e.preventDefault();keys[k]=false;el.classList.remove('pr');},{passive:false});el.addEventListener('mousedown',()=>keys[k]=true);el.addEventListener('mouseup',()=>keys[k]=false);}
mb('m1u','w');mb('m1l','a');mb('m1r','d');mb('m1p','f');mb('m1k','g');mb('m1s','q');
mb('m2u','ArrowUp');mb('m2l','ArrowLeft');mb('m2r','ArrowRight');mb('m2p','l');mb('m2k','.');mb('m2s','p');

// Blood drips on welcome
for(let i=0;i<10;i++){const d=document.createElement('div');d.className='drip';d.style.left=Math.random()*100+'%';d.style.animationDelay=Math.random()*4+'s';d.style.animationDuration=(2.5+Math.random()*2)+'s';document.getElementById('ws').appendChild(d);}
</script>
