<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIGHTER SQUAD — MORTAL EDITION</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@900&family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{--blood:#8B0000;--gold:#C9A84C;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;font-family:'Cinzel',serif;display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden;color:#fff;cursor:crosshair;}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:999;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.06) 3px,rgba(0,0,0,0.06) 4px);}
.screen{display:none;width:100vw;height:100vh;align-items:center;justify-content:center;flex-direction:column;}
.screen.active{display:flex;}

/* WELCOME */
#ws{background:radial-gradient(ellipse at 50% 60%,#1a0400 0%,#000 70%);gap:20px;text-align:center;padding:20px;position:relative;overflow:hidden;}
#ws::before,#ws::after{content:'';position:absolute;bottom:0;width:120px;background:linear-gradient(to top,#FF4500,#FF6B00,#FFD700,transparent);animation:flicker 0.3s step-end infinite alternate;opacity:0.45;filter:blur(14px);}
#ws::before{left:0;height:55%;}#ws::after{right:0;height:65%;}
@keyframes flicker{0%{height:50%;opacity:0.4}100%{height:70%;opacity:0.55}}
.mk-title{font-family:'Cinzel Decorative',serif;font-size:clamp(2rem,7vw,4.5rem);font-weight:900;letter-spacing:6px;background:linear-gradient(180deg,#FFD700 0%,#C9A84C 40%,#8B6914 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 30px rgba(201,168,76,0.8));animation:glow 2s ease-in-out infinite;line-height:1.1;}
@keyframes glow{0%,100%{filter:drop-shadow(0 0 20px rgba(201,168,76,0.5));}50%{filter:drop-shadow(0 0 50px rgba(201,168,76,1));}}
.mk-sub{font-size:clamp(0.4rem,1.5vw,0.65rem);color:#CC0000;letter-spacing:8px;margin-top:4px;}
.btn-mk{font-family:'Cinzel Decorative',serif;font-size:clamp(0.65rem,2vw,0.9rem);padding:15px 48px;background:linear-gradient(180deg,#CC0000,#8B0000);color:#FFD700;border:2px solid #C9A84C;cursor:pointer;letter-spacing:4px;clip-path:polygon(8px 0%,calc(100% - 8px) 0%,100% 8px,100% calc(100% - 8px),calc(100% - 8px) 100%,8px 100%,0% calc(100% - 8px),0% 8px);box-shadow:0 0 20px rgba(204,0,0,0.5);transition:all 0.15s;text-transform:uppercase;}
.btn-mk:hover{background:linear-gradient(180deg,#FF2D2D,#CC0000);box-shadow:0 0 40px rgba(204,0,0,0.9);transform:scale(1.03);}
.btn-mk:active{transform:scale(0.97);}
.btn-outline{font-family:'Cinzel',serif;font-size:clamp(0.45rem,1.5vw,0.65rem);padding:11px 36px;background:transparent;color:#C9A84C;border:1px solid #C9A84C;cursor:pointer;letter-spacing:3px;text-transform:uppercase;transition:all 0.15s;}
.btn-outline:hover{background:rgba(201,168,76,0.1);}
.drip{position:absolute;top:0;width:2px;background:linear-gradient(to bottom,transparent,#CC0000 60%,#880000);border-radius:0 0 3px 3px;animation:drip linear infinite;}
@keyframes drip{0%{height:0;opacity:1;top:0}80%{opacity:1}100%{height:50%;opacity:0}}

/* SELECT */
#ss{background:radial-gradient(ellipse at 50% 80%,#1a0600 0%,#000 65%);gap:14px;padding:14px;text-align:center;}
.sel-t{font-family:'Cinzel Decorative',serif;font-size:clamp(0.6rem,2.5vw,1.1rem);color:#C9A84C;letter-spacing:5px;text-shadow:0 0 20px rgba(201,168,76,0.5);}
.sel-hints{display:flex;gap:28px;justify-content:center;flex-wrap:wrap;font-size:clamp(0.27rem,0.9vw,0.42rem);letter-spacing:2px;}
.p1c{color:#00BFFF;}.p2c{color:#CC0000;}
.cg{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;max-width:800px;}
.cc{width:138px;border:2px solid #2a1000;background:#060300;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden;clip-path:polygon(4px 0%,calc(100% - 4px) 0%,100% 4px,100% calc(100% - 4px),calc(100% - 4px) 100%,4px 100%,0% calc(100% - 4px),0% 4px);}
.cc:hover{border-color:#C9A84C;transform:translateY(-5px);box-shadow:0 10px 30px rgba(0,0,0,0.9);}
.cc.p1s{border-color:#00BFFF;box-shadow:0 0 20px rgba(0,191,255,0.4);}
.cc.p2s{border-color:#CC0000;box-shadow:0 0 20px rgba(204,0,0,0.5);}
.cp{width:138px;height:130px;display:block;}
.ci{padding:7px 6px;border-top:1px solid #2a1000;background:rgba(0,0,0,0.75);}
.cn{font-size:0.36rem;letter-spacing:2px;text-transform:uppercase;}
.ct{font-size:0.26rem;letter-spacing:1px;margin-top:2px;opacity:0.6;}
.badge{position:absolute;top:4px;font-size:0.26rem;padding:2px 5px;font-family:'Cinzel',serif;letter-spacing:1px;clip-path:polygon(4px 0%,100% 0%,calc(100% - 4px) 100%,0% 100%);}
.p1b{left:4px;background:#00BFFF;color:#000;}.p2b{right:4px;background:#CC0000;color:#fff;}
.sel-st{display:flex;gap:36px;justify-content:center;flex-wrap:wrap;font-size:clamp(0.32rem,1.1vw,0.5rem);letter-spacing:2px;min-height:18px;}

/* GAME */
#gs2{flex-direction:column;background:#000;}
canvas{display:block;image-rendering:auto;}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.88);align-items:center;justify-content:center;flex-direction:column;gap:16px;z-index:500;}
.ov.show{display:flex;}
.ov-t{font-family:'Cinzel Decorative',serif;font-size:clamp(1.4rem,5vw,3rem);color:#CC0000;text-shadow:0 0 40px #8B0000;animation:glow 1s infinite;letter-spacing:4px;}
.ov-s{font-size:clamp(0.45rem,1.8vw,0.8rem);color:#C9A84C;letter-spacing:6px;}
.ov-sc{font-size:clamp(0.32rem,1vw,0.5rem);color:#666;letter-spacing:2px;}

/* Mobile */
.mc{display:none;width:100%;max-width:640px;background:#080300;padding:5px;justify-content:space-between;border-top:1px solid #1a0800;}
@media(max-width:720px){.mc{display:flex;}}
.ml{font-size:0.26rem;letter-spacing:2px;text-align:center;margin-bottom:3px;}
.mr{display:flex;gap:4px;}
.mb2{width:44px;height:44px;background:#0a0400;border:1px solid;color:#fff;font-size:0.55rem;cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none;display:flex;align-items:center;justify-content:center;clip-path:polygon(3px 0%,calc(100% - 3px) 0%,100% 3px,100% calc(100% - 3px),calc(100% - 3px) 100%,3px 100%,0% calc(100% - 3px),0% 3px);}
.mb2:active,.mb2.pr{background:#1a0800;}
.p1mb{border-color:#00BFFF;color:#00BFFF;}.p2mb{border-color:#CC0000;color:#CC0000;}
</style>
</head>
<body>

<!-- WELCOME -->
<div class="screen active" id="ws">
  <div style="position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:20px;">
    <div style="font-size:clamp(3rem,10vw,5.5rem);filter:drop-shadow(0 0 30px #CC0000);animation:glow 1.5s infinite;">🐉</div>
    <div class="mk-title">FIGHTER<br>SQUAD</div>
    <div class="mk-sub">MORTAL EDITION</div>
    <div style="height:1px;width:220px;background:linear-gradient(90deg,transparent,#C9A84C,transparent);"></div>
    <button class="btn-mk" onclick="goSel()">⚔ ENTER THE ARENA</button>
    <button class="btn-outline" onclick="goSel()">SELECT YOUR FIGHTER</button>
    <div style="font-size:clamp(0.28rem,1vw,0.4rem);color:#1a0800;letter-spacing:4px;margin-top:4px;">THERE CAN BE ONLY ONE</div>
  </div>
</div>

<!-- SELECT -->
<div class="screen" id="ss">
  <div class="sel-t">⚔ CHOOSE YOUR FIGHTER ⚔</div>
  <div class="sel-hints">
    <span class="p1c">P1 — WASD + F(punch) G(kick) Q(special)</span>
    <span class="p2c">P2 — ARROWS + L(punch) .(kick) P(special)</span>
  </div>
  <div class="cg" id="cg"></div>
  <div class="sel-st">
    <span class="p1c" id="p1st">P1 — CHOOSE FIGHTER</span>
    <span class="p2c" id="p2st">P2 — CHOOSE FIGHTER</span>
  </div>
  <button class="btn-mk" id="bFight" style="display:none" onclick="startFight()">⚔ FIGHT!</button>
</div>

<!-- GAME -->
<div class="screen" id="gs2">
  <canvas id="gc"></canvas>
  <div class="mc" id="mc">
    <div><div class="ml p1c">P1</div>
      <div class="mr"><div style="width:44px"></div><button class="mb2 p1mb" id="m1u">▲</button><div style="width:44px"></div></div>
      <div class="mr" style="margin-top:4px;"><button class="mb2 p1mb" id="m1l">◄</button><button class="mb2 p1mb" id="m1p">👊</button><button class="mb2 p1mb" id="m1r">►</button></div>
    </div>
    <div style="display:flex;flex-direction:column;gap:4px;justify-content:flex-end;">
      <button class="mb2 p1mb" id="m1k" style="width:88px;font-size:0.4rem;">KICK</button>
      <button class="mb2 p1mb" id="m1s" style="width:88px;font-size:0.38rem;">SPECIAL</button>
    </div>
    <div style="display:flex;flex-direction:column;gap:4px;justify-content:flex-end;">
      <button class="mb2 p2mb" id="m2k" style="width:88px;font-size:0.4rem;">KICK</button>
      <button class="mb2 p2mb" id="m2s" style="width:88px;font-size:0.38rem;">SPECIAL</button>
    </div>
    <div><div class="ml p2c">P2</div>
      <div class="mr"><div style="width:44px"></div><button class="mb2 p2mb" id="m2u">▲</button><div style="width:44px"></div></div>
      <div class="mr" style="margin-top:4px;"><button class="mb2 p2mb" id="m2l">◄</button><button class="mb2 p2mb" id="m2p">👊</button><button class="mb2 p2mb" id="m2r">►</button></div>
    </div>
  </div>
</div>

<!-- OVERLAY -->
<div class="ov" id="ov">
  <div class="ov-t" id="ovT">FIGHT!</div>
  <div class="ov-s" id="ovS"></div>
  <div class="ov-sc" id="ovSc"></div>
  <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center;" id="ovBtns">
    <button class="btn-mk" onclick="startFight()">▶ REMATCH</button>
    <button class="btn-outline" onclick="goSel()">◀ CHANGE FIGHTER</button>
  </div>
</div>

<script>
// =====================================================
// CHARACTER DATA — based on photo observation
// Faruqal: chubby, navy shirt, no glasses (front selfie guy)
// Syida: hijab cream, round glasses, navy top (middle front)
// Ika: hijab maroon, round glasses, red top (middle back)
// Faisal: glasses, navy shirt, arms crossed (back right)
// Ikmal: created original — tall, green outfit, warrior
// =====================================================
const CHARS = [
  { name:'FARUQAL', title:'THE IRON FIST',    icon:'👊',
    accent:'#4488FF', glow:'#00BFFF',
    spec:'SEISMIC SLAM',
    outfit:'faruqal' },
  { name:'SYIDA',   title:'SHADOW VEIL',      icon:'🌙',
    accent:'#FFAACC', glow:'#FF69B4',
    spec:'VEIL STORM',
    outfit:'syida' },
  { name:'IKA',     title:'CRIMSON ROSE',     icon:'🌹',
    accent:'#FF4466', glow:'#FF6688',
    spec:'ROSE FURY',
    outfit:'ika' },
  { name:'FAISAL',  title:'THE STRATEGIST',   icon:'⚡',
    accent:'#FFCC44', glow:'#FFD700',
    spec:'THUNDER MIND',
    outfit:'faisal' },
  { name:'IKMAL',   title:'STORM WARRIOR',    icon:'🌪️',
    accent:'#44FF88', glow:'#00FF88',
    spec:'TEMPEST RAGE',
    outfit:'ikmal' },
];

let p1i=null, p2i=null, keys={}, raf, gs={};
const GW=600, GH=360, FLOOR=GH-72;
const GRAV=0.58, JUMP=-14;

// =====================================================
// SPRITE DRAWING — smooth canvas art, cartoon style
// Based on photo: round faces, glasses where needed, hijab for girls
// =====================================================

function drawFighter(ctx, x, y, charIdx, state, facingRight, tick){
  ctx.save();
  ctx.translate(x, y);
  if(!facingRight){ ctx.scale(-1,1); }

  // Ground shadow
  ctx.fillStyle='rgba(0,0,0,0.4)';
  ctx.beginPath(); ctx.ellipse(0,2,22,6,0,0,Math.PI*2); ctx.fill();

  const bob = state==='idle' ? Math.sin(tick*0.07)*2.5 : 0;
  ctx.translate(0, bob);

  switch(charIdx){
    case 0: drawFaruqal(ctx,state,tick); break;
    case 1: drawSyida(ctx,state,tick); break;
    case 2: drawIka(ctx,state,tick); break;
    case 3: drawFaisal(ctx,state,tick); break;
    case 4: drawIkmal(ctx,state,tick); break;
  }

  ctx.restore();
}

// ---- HELPER DRAWING PRIMITIVES ----
function roundRect(ctx,x,y,w,h,r,fill,stroke){
  ctx.beginPath();
  ctx.roundRect(x,y,w,h,r);
  if(fill){ctx.fillStyle=fill;ctx.fill();}
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=1.5;ctx.stroke();}
}

function drawHead(ctx, headColor, hairColor, eyeStyle, mouthStyle, headW=34, headH=32, extraFn=null){
  // Neck
  ctx.fillStyle=headColor;
  roundRect(ctx,-7,-58,14,12,3,headColor);
  // Head
  roundRect(ctx,-headW/2,-90,headW,headH,10,headColor);
  // Ear
  ctx.fillStyle=headColor;
  ctx.beginPath(); ctx.ellipse(-headW/2,-74,5,7,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(headW/2,-74,5,7,0,0,Math.PI*2); ctx.fill();
  // Hair
  if(hairColor){
    ctx.fillStyle=hairColor;
    ctx.beginPath();
    ctx.ellipse(0,-88,headW/2+2,10,0,Math.PI,Math.PI*2);
    ctx.fill();
  }
  // Eyes
  if(eyeStyle==='normal'){
    // whites
    roundRect(ctx,-14,-78,10,7,3,'#fff');
    roundRect(ctx,4,-78,10,7,3,'#fff');
    // pupils
    ctx.fillStyle='#1a0800';
    ctx.beginPath(); ctx.arc(-9,-75,2.5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(9,-75,2.5,0,Math.PI*2); ctx.fill();
    // glint
    ctx.fillStyle='white';
    ctx.beginPath(); ctx.arc(-8,-74,1,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(10,-74,1,0,Math.PI*2); ctx.fill();
  } else if(eyeStyle==='hurt'){
    ctx.strokeStyle='#CC0000'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(-13,-78); ctx.lineTo(-7,-73); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-7,-78); ctx.lineTo(-13,-73); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(5,-78); ctx.lineTo(11,-73); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(11,-78); ctx.lineTo(5,-73); ctx.stroke();
  }
  // Mouth smile
  if(mouthStyle==='smile'){
    ctx.strokeStyle='#8B4513'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(0,-68,8,0.2,Math.PI-0.2); ctx.stroke();
    // teeth
    ctx.fillStyle='white';
    ctx.beginPath(); ctx.arc(0,-67,5,0,Math.PI); ctx.fill();
  } else if(mouthStyle==='grit'){
    ctx.strokeStyle='#8B4513'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(-8,-68); ctx.lineTo(8,-68); ctx.stroke();
  }
  if(extraFn) extraFn(ctx);
}

function drawGlasses(ctx, style='round'){
  ctx.strokeStyle='#333'; ctx.lineWidth=2;
  if(style==='round'){
    ctx.beginPath(); ctx.arc(-9,-75,7,0,Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.arc(9,-75,7,0,Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-2,-75); ctx.lineTo(2,-75); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-16,-75); ctx.lineTo(-20,-72); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(16,-75); ctx.lineTo(20,-72); ctx.stroke();
  }
}

function drawHijab(ctx, color1, color2=null){
  // Outer hijab shape
  ctx.fillStyle=color1;
  ctx.beginPath();
  ctx.ellipse(0,-78,22,28,0,0,Math.PI*2);
  ctx.fill();
  // Face opening
  ctx.fillStyle='inherit'; // will be set by caller
  // Inner oval
  ctx.beginPath();
  ctx.ellipse(0,-80,14,18,0,0,Math.PI*2);
  // This clips to show face — handled by drawing face after
}

// ===== FARUQAL — chubby, navy shirt, wavy hair, big smile =====
function drawFaruqal(ctx, state, tick){
  const skin='#C8A070', dark='#A07848';
  const navy='#1e2d5a', navyD='#151f3e';
  const hair='#1a1008';

  if(state==='special'){
    // Energy aura
    const aura=ctx.createRadialGradient(0,-50,5,0,-50,65);
    aura.addColorStop(0,'rgba(68,136,255,0.4)'); aura.addColorStop(1,'transparent');
    ctx.fillStyle=aura; ctx.beginPath(); ctx.arc(0,-50,65,0,Math.PI*2); ctx.fill();
    for(let i=0;i<6;i++){
      const a=tick*0.04+i*Math.PI/3;
      ctx.fillStyle='#4488FF';
      ctx.globalAlpha=0.7;
      ctx.fillRect(Math.cos(a)*40-3,Math.sin(a)*30-50-3,6,6);
    }
    ctx.globalAlpha=1;
  }

  // Body — stocky build
  const bodyX=-24, bodyY=-58, bodyW=48, bodyH=52;
  roundRect(ctx,bodyX,bodyY,bodyW,bodyH,8,navy);
  // Collar/shirt detail
  ctx.fillStyle=navyD;
  ctx.beginPath(); ctx.moveTo(-8,-58); ctx.lineTo(0,-48); ctx.lineTo(8,-58); ctx.closePath(); ctx.fill();
  // Buttons
  for(let i=0;i<3;i++){
    ctx.fillStyle='#aaa'; ctx.beginPath(); ctx.arc(0,-52+i*8,2,0,Math.PI*2); ctx.fill();
  }

  // Arms
  if(state==='punch'){
    // Right arm extended punch
    roundRect(ctx,24,-56,38,14,7,navy);
    // Fist
    roundRect(ctx,58,-58,16,16,5,skin);
    // Left arm back
    roundRect(ctx,-42,-56,20,14,7,navyD);
  } else if(state==='kick'){
    // Left arm up
    roundRect(ctx,-40,-66,18,28,7,navy);
    // Right leg kick
    roundRect(ctx,10,-22,42,14,7,navyD);
    ctx.fillStyle='#111'; roundRect(ctx,48,-24,16,16,4,'#222');
  } else if(state==='special'){
    // Both arms spread wide
    roundRect(ctx,-60,-58,38,14,7,navy);
    roundRect(ctx,22,-58,38,14,7,navy);
    ctx.fillStyle=skin;
    roundRect(ctx,-68,-60,14,16,5,skin);
    roundRect(ctx,60,-60,14,16,5,skin);
  } else {
    roundRect(ctx,-38,-56,16,36,7,navy);
    roundRect(ctx,22,-56,16,36,7,navy);
    ctx.fillStyle=skin;
    roundRect(ctx,-40,-22,16,14,5,skin);
    roundRect(ctx,24,-22,16,14,5,skin);
  }

  // Legs
  if(state!=='kick'){
    roundRect(ctx,-22,-6,20,30,6,navyD);
    roundRect(ctx,2,-6,20,30,6,navyD);
    // Boots
    roundRect(ctx,-24,22,22,12,4,'#111');
    roundRect(ctx,2,22,22,12,4,'#111');
  } else {
    roundRect(ctx,-22,-6,20,34,6,navyD);
    roundRect(ctx,-24,26,22,12,4,'#111');
  }

  // Belt
  roundRect(ctx,-24,-8,48,8,3,'#8B6914');
  ctx.fillStyle='#C9A84C'; ctx.beginPath(); ctx.arc(0,-4,5,0,Math.PI*2); ctx.fill();

  // HEAD — chubby, round face
  ctx.fillStyle=skin;
  roundRect(ctx,-19,-90,38,34,12,skin);
  ctx.beginPath(); ctx.ellipse(-19,-73,6,8,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(19,-73,6,8,0,0,Math.PI*2); ctx.fill();

  // Hair — wavy on top
  ctx.fillStyle=hair;
  ctx.beginPath();
  ctx.moveTo(-19,-88);
  ctx.bezierCurveTo(-20,-100,-10,-102,0,-98);
  ctx.bezierCurveTo(10,-102,20,-100,19,-88);
  ctx.fill();
  // Hair waves
  ctx.strokeStyle=hair; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(-14,-95); ctx.bezierCurveTo(-8,-98,-2,-96,4,-95); ctx.stroke();

  // Eyes (normal or hurt)
  const eyeCol=state==='hurt'?'hurt':'normal';
  if(eyeCol==='hurt'){
    ctx.strokeStyle='#CC0000'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(-13,-77); ctx.lineTo(-7,-72); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-7,-77); ctx.lineTo(-13,-72); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(5,-77); ctx.lineTo(11,-72); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(11,-77); ctx.lineTo(5,-72); ctx.stroke();
  } else {
    roundRect(ctx,-14,-78,11,8,3,'#fff');
    roundRect(ctx,3,-78,11,8,3,'#fff');
    ctx.fillStyle='#1a0800'; ctx.beginPath(); ctx.arc(-9,-74,3,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(9,-74,3,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='white'; ctx.beginPath(); ctx.arc(-8,-73,1,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(10,-73,1,0,Math.PI*2); ctx.fill();
  }

  // Big wide smile
  ctx.strokeStyle='#8B4513'; ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.arc(0,-66,10,0.1,Math.PI-0.1); ctx.stroke();
  ctx.fillStyle='white';
  ctx.beginPath(); ctx.arc(0,-65,7,0.1,Math.PI-0.1); ctx.fill();

  // Chubby cheeks

    ctx.beginPath(); ctx.moveTo(-11,-80); ctx.lineTo(-7,-76); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-7,-80); ctx.lineTo(-11,-76); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(5,-80); ctx.lineTo(9,-76); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(9,-80); ctx.lineTo(5,-76); ctx.stroke();
  } else {
    // Sharp, angular eyes
    ctx.fillStyle='#fff'; ctx.beginPath();
    ctx.moveTo(-12,-82); ctx.lineTo(-6,-82); ctx.lineTo(-5,-78); ctx.lineTo(-12,-78); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#fff'; ctx.beginPath();
    ctx.moveTo(5,-82); ctx.lineTo(11,-82); ctx.lineTo(11,-78); ctx.lineTo(5,-78); ctx.closePath(); ctx.fill();
    // Pupils
    ctx.fillStyle='#1a3a10'; ctx.beginPath(); ctx.arc(-9,-80,2.5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(8,-80,2.5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='white'; ctx.beginPath(); ctx.arc(-8,-79,1,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(9,-79,1,0,Math.PI*2); ctx.fill();
    // Determined brow
    ctx.strokeStyle='#3a2800'; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.moveTo(-13,-84); ctx.lineTo(-5,-83); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(5,-83); ctx.lineTo(13,-84); ctx.stroke();
  }

  // Serious mouth
  ctx.strokeStyle='#6a5030'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(-7,-70); ctx.lineTo(7,-70); ctx.stroke();
  // Scar
  ctx.strokeStyle='rgba(150,80,60,0.6)'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(6,-84); ctx.lineTo(10,-78); ctx.stroke();

  if(state==='hurt'){
    ctx.fillStyle='rgba(255,0,0,0.12)';
    ctx.beginPath(); ctx.arc(0,-62,50,0,Math.PI*2); ctx.fill();
  }
}

// SELECT SCREEN PORTRAITS
// =====================================================
function goSel(){
  p1i=null; p2i=null;
  buildCards();
  document.getElementById('p1st').textContent='P1 — CHOOSE FIGHTER';
  document.getElementById('p2st').textContent='P2 — CHOOSE FIGHTER';
  document.getElementById('bFight').style.display='none';
  document.getElementById('ov').classList.remove('show');
  cancelAnimationFrame(raf);
  showScr('ss');
}

function buildCards(){
  const grid=document.getElementById('cg');
  grid.innerHTML='';
  CHARS.forEach((c,i)=>{
    const card=document.createElement('div');
    card.className='cc'; card.id='cc'+i;

    const pc=document.createElement('canvas');
    pc.className='cp'; pc.width=138; pc.height=130;
    drawPortrait(pc,i,c);

    const info=document.createElement('div');
    info.className='ci';
    info.innerHTML=`<div class="cn" style="color:${c.accent};text-shadow:0 0 8px ${c.glow};">${c.icon} ${c.name}</div>
      <div class="ct" style="color:${c.glow}66;">${c.title}</div>`;

    card.appendChild(pc);
    card.appendChild(info);
    card.onclick=()=>pickChar(i);
    grid.appendChild(card);
  });
}

function drawPortrait(canvas, charIdx, c){
  const ctx=canvas.getContext('2d');
  const W=canvas.width, H=canvas.height;
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,c.accent+'33'); bg.addColorStop(1,'#000');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);
  const vig=ctx.createRadialGradient(W/2,H/2,15,W/2,H/2,80);
  vig.addColorStop(0,'transparent'); vig.addColorStop(1,'rgba(0,0,0,0.7)');
  ctx.fillStyle=vig; ctx.fillRect(0,0,W,H);
  // Draw fighter centered, slightly larger for portrait
  ctx.save(); ctx.scale(1.15,1.15);
  drawFighter(ctx,W/2/1.15,(H+20)/1.15,charIdx,'idle',true,60);
  ctx.restore();
  const ng=ctx.createLinearGradient(0,H-28,0,H);
  ng.addColorStop(0,'transparent'); ng.addColorStop(1,c.accent+'66');
  ctx.fillStyle=ng; ctx.fillRect(0,H-28,W,28);
}

function pickChar(i){
  if(p1i===null){ p1i=i; }
  else if(p2i===null&&i!==p1i){ p2i=i; }
  else if(i===p1i){ p1i=null; }
  else if(i===p2i){ p2i=null; }
  else { p2i=i; }

  document.querySelectorAll('.cc').forEach((card,j)=>{
    card.classList.remove('p1s','p2s');
    card.querySelectorAll('.badge').forEach(b=>b.remove());
    if(j===p1i){
      card.classList.add('p1s');
      const b=document.createElement('div');b.className='badge p1b';b.textContent='P1';card.appendChild(b);
    }
    if(j===p2i){
      card.classList.add('p2s');
      const b=document.createElement('div');b.className='badge p2b';b.textContent='P2';card.appendChild(b);
    }
  });

  document.getElementById('p1st').innerHTML=p1i!==null
    ?`<span style="color:${CHARS[p1i].accent}">${CHARS[p1i].icon} P1: ${CHARS[p1i].name}</span>`
    :'P1 — CHOOSE FIGHTER';
  document.getElementById('p2st').innerHTML=p2i!==null
    ?`<span style="color:${CHARS[p2i].accent}">${CHARS[p2i].icon} P2: ${CHARS[p2i].name}</span>`
    :'P2 — CHOOSE FIGHTER';
  document.getElementById('bFight').style.display=(p1i!==null&&p2i!==null)?'block':'none';
}

// =====================================================
// GAME ENGINE
// =====================================================
function showScr(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startFight(){
  document.getElementById('ov').classList.remove('show');
  showScr('gs2');
  initGame();
}

function initGame(){
  const canvas=document.getElementById('gc');
  const isMob=window.innerWidth<=720;
  const scale=Math.min(window.innerWidth/GW,(window.innerHeight-(isMob?90:0))/GH,2);
  canvas.width=GW; canvas.height=GH;
  canvas.style.width=GW*scale+'px'; canvas.style.height=GH*scale+'px';

  gs={
    canvas, ctx:canvas.getContext('2d'),
    timer:99, tF:0, tick:0,
    blood:[], hitFX:[],
    p1:{x:110,y:FLOOR,vy:0,hp:100,mhp:100,face:1,ci:p1i,
      atkCD:0,hurtT:0,punch:0,kick:0,specCD:0,specA:0,blocking:0,jumping:false,wins:0,state:'idle'},
    p2:{x:GW-110,y:FLOOR,vy:0,hp:100,mhp:100,face:-1,ci:p2i,
      atkCD:0,hurtT:0,punch:0,kick:0,specCD:0,specA:0,blocking:0,jumping:false,wins:0,state:'idle'},
    done:false, flash:50,
  };

  cancelAnimationFrame(raf);
  gameLoop();
  showMsg('FIGHT!','',false);
  setTimeout(()=>document.getElementById('ov').classList.remove('show'),900);
}

function gameLoop(){ updateG(); renderG(); raf=requestAnimationFrame(gameLoop); }

function updateG(){
  if(gs.done) return;
  const{p1,p2}=gs;
  gs.tick++;
  gs.tF++;
  if(gs.tF>=60){gs.tF=0;gs.timer--;if(gs.timer<=0)endRound();}
  [p1,p2].forEach(p=>{
    if(p.atkCD>0)p.atkCD--;
    if(p.hurtT>0)p.hurtT--;
    if(p.punch>0)p.punch--;
    if(p.kick>0)p.kick--;
    if(p.specCD>0)p.specCD--;
    if(p.specA>0)p.specA--;
    if(p.blocking>0)p.blocking--;
    if(p.hurtT>0) p.state='hurt';
    else if(p.specA>0) p.state='special';
    else if(p.punch>0) p.state='punch';
    else if(p.kick>0) p.state='kick';
    else p.state='idle';
  });

  if(!p1.hurtT){
    if(keys['a']&&p1.x>45) p1.x-=3;
    if(keys['d']&&p1.x<GW-45) p1.x+=3;
    if(keys['w']&&!p1.jumping){p1.vy=JUMP;p1.jumping=true;}
    if(keys['s']) p1.blocking=5;
    if(keys['f']&&p1.atkCD===0){p1.punch=15;p1.atkCD=22;doHit(p1,p2,18,'punch');}
    if(keys['g']&&p1.atkCD===0){p1.kick=16;p1.atkCD=28;doHit(p1,p2,24,'kick');}
    if(keys['q']&&p1.specCD===0){p1.specA=28;p1.specCD=140;doHit(p1,p2,38,'special');}
  }
  if(!p2.hurtT){
    if(keys['ArrowLeft']&&p2.x>45) p2.x-=3;
    if(keys['ArrowRight']&&p2.x<GW-45) p2.x+=3;
    if(keys['ArrowUp']&&!p2.jumping){p2.vy=JUMP;p2.jumping=true;}
    if(keys['ArrowDown']) p2.blocking=5;
    if(keys['l']&&p2.atkCD===0){p2.punch=15;p2.atkCD=22;doHit(p2,p1,18,'punch');}
    if(keys['.']&&p2.atkCD===0){p2.kick=16;p2.atkCD=28;doHit(p2,p1,24,'kick');}
    if(keys['p']&&p2.specCD===0){p2.specA=28;p2.specCD=140;doHit(p2,p1,38,'special');}
  }

  [p1,p2].forEach(p=>{
    p.vy+=GRAV; p.y+=p.vy;
    if(p.y>=FLOOR){p.y=FLOOR;p.vy=0;p.jumping=false;}
    if(p.state==='idle') p.face=p.x<(p===p1?p2.x:p1.x)?1:-1;
  });

  gs.blood=gs.blood.filter(b=>{b.x+=b.vx;b.y+=b.vy;b.vy+=0.35;b.life--;return b.life>0;});
  gs.hitFX=gs.hitFX.filter(f=>{f.life--;return f.life>0;});
}

function doHit(atk,def,baseDmg,type){
  const dist=Math.abs(atk.x-def.x);
  const range=type==='special'?160:type==='kick'?100:80;
  if(dist>range) return;
  const blocked=def.blocking>0;
  const dmg=blocked?Math.ceil(baseDmg*0.15):baseDmg;
  def.hp=Math.max(0,def.hp-dmg);
  if(!blocked){def.hurtT=22;const dir=def.x>atk.x?1:-1;def.x=Math.max(45,Math.min(GW-45,def.x+dir*22));}
  else def.hurtT=5;

  if(!blocked&&dmg>5){
    for(let i=0;i<(type==='special'?18:8);i++){
      gs.blood.push({x:def.x,y:def.y-55,vx:(Math.random()-0.5)*10,vy:Math.random()*-8,life:35+Math.random()*15,r:2+Math.random()*3.5});
    }
  }
  const c=CHARS[atk.ci];
  const msgs={punch:['POW!','CRACK!','BAM!'],kick:['KICK!','SMASH!','BREAK!'],special:['BRUTALITY!','FINISH HIM!','FATALITY?']};
  gs.hitFX.push({x:(atk.x+def.x)/2,y:def.y-90,text:msgs[type][Math.floor(Math.random()*3)],color:type==='special'?c.accent:'#fff',life:55,max:55,sz:type==='special'?16:11});
  if(def.hp<=0) endRound();
}

function endRound(){
  if(gs.done) return;
  gs.done=true;
  const{p1,p2}=gs;
  let winner=null;
  if(!(p1.hp<=0&&p2.hp<=0)){
    if(p2.hp>p1.hp||p1.hp<=0){p2.wins++;winner=p2;}
    else{p1.wins++;winner=p1;}
  }
  setTimeout(()=>{
    const sub=gs.timer<=0?'TIME OVER':'K.O.';
    showMsg(winner?`${CHARS[winner.ci].name} WINS!`:'DRAW!',sub,true,`${CHARS[p1.ci].icon} ${p1.wins} — ${p2.wins} ${CHARS[p2.ci].icon}`);
  },1500);
}

function showMsg(t,s,btns,sc=''){
  document.getElementById('ovT').textContent=t;
  document.getElementById('ovS').textContent=s;
  document.getElementById('ovSc').textContent=sc;
  document.getElementById('ovBtns').style.display=btns?'flex':'none';
  document.getElementById('ov').classList.add('show');
}

// =====================================================
// RENDER
// =====================================================
function renderG(){
  const{ctx,p1,p2,blood,hitFX,timer,tick}=gs;
  const si=(p1.ci+p2.ci)%3;
  const bgs=[['#0d0200','#1a0600'],['#00060d','#001520'],['#080010','#140025']];
  const bg=ctx.createLinearGradient(0,0,0,GH);
  bg.addColorStop(0,bgs[si][0]); bg.addColorStop(1,bgs[si][1]);
  ctx.fillStyle=bg; ctx.fillRect(0,0,GW,GH);

  drawBG(ctx,tick);

  ctx.fillStyle='#140800'; ctx.fillRect(0,FLOOR+40,GW,GH);
  for(let x=0;x<GW;x+=50){
    ctx.fillStyle=x%100===0?'#1c0c00':'#160800';
    ctx.fillRect(x,FLOOR+40,48,GH);
    ctx.fillStyle='#080400'; ctx.fillRect(x+48,FLOOR+40,2,GH);
  }
  const fe=ctx.createLinearGradient(0,FLOOR+38,0,FLOOR+52);
  fe.addColorStop(0,'rgba(200,60,0,0.45)'); fe.addColorStop(1,'transparent');
  ctx.fillStyle=fe; ctx.fillRect(0,FLOOR+38,GW,14);
  ctx.fillStyle='#331200'; ctx.fillRect(0,FLOOR+38,GW,2);

  blood.forEach(b=>{
    if(b.y>=FLOOR+38){ctx.fillStyle='rgba(110,0,0,0.55)';ctx.beginPath();ctx.arc(b.x,FLOOR+41,b.r*2,0,Math.PI*2);ctx.fill();}
  });
  blood.forEach(b=>{
    if(b.y<FLOOR+38){ctx.globalAlpha=b.life/50;ctx.fillStyle='#BB0000';ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;}
  });

  drawFighter(ctx,p1.x,p1.y,p1.ci,p1.state,p1.x<p2.x,tick);
  drawFighter(ctx,p2.x,p2.y,p2.ci,p2.state,p2.x<p1.x,tick);

  hitFX.forEach(f=>{
    ctx.save();
    const a=f.life/f.max;
    ctx.translate(f.x,f.y-(1-a)*18);
    ctx.globalAlpha=a;
    ctx.fillStyle=f.color; ctx.shadowColor=f.color; ctx.shadowBlur=14;
    ctx.font=`bold ${f.sz}px 'Cinzel Decorative',serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(f.text,0,0);
    ctx.restore(); ctx.shadowBlur=0;
  });

  drawHUD(ctx,p1,p2,timer);

  if(gs.flash>0){
    gs.flash--;
    ctx.globalAlpha=gs.flash/50*0.28;
    ctx.fillStyle='#CC0000'; ctx.fillRect(0,0,GW,GH);
    ctx.globalAlpha=1;
  }
}

function drawBG(ctx,tick){
  const torches=[65,GW-65,GW/2];
  torches.forEach(tx=>{
    ctx.fillStyle='#251000'; ctx.fillRect(tx-3,52,6,24);
    ctx.fillStyle='#180a00'; ctx.fillRect(tx-7,74,14,5);
    const fl=Math.sin(tick*0.18+tx)*3;
    const fg=ctx.createRadialGradient(tx,50+fl,1,tx,50+fl,22);
    fg.addColorStop(0,'rgba(255,210,60,0.95)');
    fg.addColorStop(0.4,'rgba(255,80,10,0.6)');
    fg.addColorStop(1,'transparent');
    ctx.fillStyle=fg;
    ctx.beginPath(); ctx.ellipse(tx,50+fl,8+fl,18,0,0,Math.PI*2); ctx.fill();
    const gp=ctx.createRadialGradient(tx,FLOOR+40,5,tx,FLOOR+40,110);
    gp.addColorStop(0,'rgba(255,80,0,0.07)'); gp.addColorStop(1,'transparent');
    ctx.fillStyle=gp; ctx.fillRect(tx-110,FLOOR,220,GH);
  });

  for(let px2=55;px2<GW;px2+=130){
    ctx.fillStyle='rgba(8,3,0,0.75)';
    ctx.fillRect(px2-13,38,26,FLOOR-38+40);
    ctx.fillStyle='rgba(22,10,0,0.65)'; ctx.fillRect(px2-17,38,34,10);
    ctx.fillRect(px2-17,FLOOR+36,34,10);
    ctx.fillStyle='rgba(35,16,0,0.45)'; ctx.fillRect(px2-2,48,4,FLOOR-48+36);
    ctx.strokeStyle='rgba(40,20,0,0.4)'; ctx.lineWidth=1; ctx.setLineDash([3,6]);
    ctx.beginPath(); ctx.moveTo(px2,38); ctx.lineTo(px2,100); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle='rgba(50,25,0,0.55)';
    ctx.beginPath(); ctx.arc(px2,102,7,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(70,35,0,0.5)';
    ctx.fillText('☠',px2-5,106);
  }

  ctx.fillStyle='rgba(10,4,0,0.55)';
  ctx.beginPath(); ctx.moveTo(0,FLOOR+38);
  for(let x=0;x<=GW;x+=70){ ctx.lineTo(x,FLOOR-35+Math.sin(x*0.04+tick*0.005)*20+38); }
  ctx.lineTo(GW,FLOOR+38); ctx.closePath(); ctx.fill();
}

function drawHUD(ctx,p1,p2,timer){
  const PAD=12,BW=220,BH=20,HY=10;
  const c1=CHARS[p1.ci], c2=CHARS[p2.ci];

  ctx.fillStyle='rgba(0,0,0,0.72)'; ctx.fillRect(PAD,HY,BW+2,BH+2);
  const p1p=p1.hp/p1.mhp;
  const p1c=p1p>0.5?'#00CC44':p1p>0.25?'#FFD700':'#CC0000';
  const pg1=ctx.createLinearGradient(PAD,0,PAD+BW*p1p,0);
  pg1.addColorStop(0,p1c); pg1.addColorStop(1,p1c+'77');
  ctx.fillStyle=pg1; ctx.fillRect(PAD+1,HY+1,Math.floor(BW*p1p),BH);
  ctx.strokeStyle=c1.accent; ctx.lineWidth=1.5; ctx.strokeRect(PAD,HY,BW+2,BH+2);

  const p2x=GW-PAD-BW-2;
  ctx.fillStyle='rgba(0,0,0,0.72)'; ctx.fillRect(p2x,HY,BW+2,BH+2);
  const p2p=p2.hp/p2.mhp;
  const p2c=p2p>0.5?'#00CC44':p2p>0.25?'#FFD700':'#CC0000';
  const pg2=ctx.createLinearGradient(p2x+BW,0,p2x+BW-BW*p2p,0);
  pg2.addColorStop(0,p2c); pg2.addColorStop(1,p2c+'77');
  ctx.fillStyle=pg2; ctx.fillRect(p2x+1+Math.floor(BW*(1-p2p)),HY+1,Math.floor(BW*p2p),BH);
  ctx.strokeStyle=c2.accent; ctx.lineWidth=1.5; ctx.strokeRect(p2x,HY,BW+2,BH+2);

  ctx.shadowBlur=6;
  ctx.fillStyle=c1.accent; ctx.shadowColor=c1.accent; ctx.font=`bold 9px 'Cinzel',serif`; ctx.textAlign='left';
  ctx.fillText(`${c1.icon} ${c1.name}`,PAD,HY+32);
  ctx.fillStyle=c2.accent; ctx.shadowColor=c2.accent; ctx.textAlign='right';
  ctx.fillText(`${c2.name} ${c2.icon}`,GW-PAD,HY+32);
  ctx.shadowBlur=0;

  const tc=timer>30?'#C9A84C':timer>10?'#FF6B00':'#CC0000';
  ctx.fillStyle='rgba(0,0,0,0.82)'; ctx.fillRect(GW/2-25,HY-2,50,26);
  ctx.strokeStyle=tc; ctx.lineWidth=1.5; ctx.strokeRect(GW/2-25,HY-2,50,26);
  ctx.fillStyle=tc; ctx.shadowColor=tc; ctx.shadowBlur=10;
  ctx.font=`bold 18px 'Cinzel Decorative',serif`; ctx.textAlign='center';
  ctx.fillText(String(timer).padStart(2,'0'),GW/2,HY+17); ctx.shadowBlur=0;

  for(let i=0;i<3;i++){
    ctx.fillStyle=i<p1.wins?'#FFD700':'#221000';
    ctx.beginPath(); ctx.arc(PAD+8+i*14,HY+39,5,0,Math.PI*2); ctx.fill();
    if(i<p1.wins){ctx.strokeStyle='#FF6B00';ctx.lineWidth=1;ctx.stroke();}
  }
  for(let i=0;i<3;i++){
    ctx.fillStyle=i<p2.wins?'#FFD700':'#221000';
    ctx.beginPath(); ctx.arc(GW-PAD-8-i*14,HY+39,5,0,Math.PI*2); ctx.fill();
    if(i<p2.wins){ctx.strokeStyle='#FF6B00';ctx.lineWidth=1;ctx.stroke();}
  }

  const s1=1-p1.specCD/140;
  ctx.fillStyle='#100500'; ctx.fillRect(PAD,HY+44,BW/2,5);
  const sg1=ctx.createLinearGradient(PAD,0,PAD+BW/2*s1,0);
  sg1.addColorStop(0,c1.accent); sg1.addColorStop(1,c1.accent+'33');
  ctx.fillStyle=sg1; ctx.fillRect(PAD,HY+44,Math.floor(BW/2*s1),5);
  ctx.font=`5px 'Cinzel',serif`; ctx.textAlign='left'; ctx.fillStyle='#3a2000';
  ctx.fillText('SPECIAL',PAD,HY+56);

  const s2=1-p2.specCD/140;
  const sx=GW-PAD-BW/2;
  ctx.fillStyle='#100500'; ctx.fillRect(sx,HY+44,BW/2,5);
  const sg2=ctx.createLinearGradient(sx+BW/2,0,sx+BW/2-BW/2*s2,0);
  sg2.addColorStop(0,c2.accent); sg2.addColorStop(1,c2.accent+'33');
  ctx.fillStyle=sg2; ctx.fillRect(sx+Math.floor(BW/2*(1-s2)),HY+44,Math.floor(BW/2*s2),5);
  ctx.textAlign='right'; ctx.fillStyle='#3a2000'; ctx.fillText('SPECIAL',GW-PAD,HY+56);
}

document.addEventListener('keydown',e=>{keys[e.key]=true;if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key))e.preventDefault();});
document.addEventListener('keyup',e=>{keys[e.key]=false;});
function mb(id,k){
  const el=document.getElementById(id); if(!el) return;
  el.addEventListener('touchstart',e=>{e.preventDefault();keys[k]=true;el.classList.add('pr');},{passive:false});
  el.addEventListener('touchend',e=>{e.preventDefault();keys[k]=false;el.classList.remove('pr');},{passive:false});
  el.addEventListener('mousedown',()=>keys[k]=true);
  el.addEventListener('mouseup',()=>keys[k]=false);
}

for(let i=0;i<10;i++){
