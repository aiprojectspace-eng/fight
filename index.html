<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>High-End Athletic Humanoid (No Sprites)</title>
    <style>
        body { margin: 0; background: radial-gradient(circle, #1a1a1a 0%, #000 100%); overflow: hidden; }
    </style>
</head>
<body>
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Lighting - Guna 'Rim Light' untuk nampak muscle contour
        const light1 = new THREE.PointLight(0xffffff, 100, 100);
        light1.position.set(5, 5, 5);
        scene.add(light1);

        const light2 = new THREE.PointLight(0x0088ff, 50, 100); // Rim light biru
        light2.position.set(-5, 2, -5);
        scene.add(light2);

        // Material "Liquid Obsidian" - Nampak mahal & sleek
        const bodyMat = new THREE.MeshStandardMaterial({ 
            color: 0x111111, roughness: 0.1, metalness: 0.9, flatShading: false 
        });

        const model = new THREE.Group();

        // 1. Torso (V-Shape Athletic)
        const torsoGeo = new THREE.CylinderGeometry(0.35, 0.15, 1.0, 32);
        const torso = new THREE.Mesh(torsoGeo, bodyMat);
        torso.scale.set(1.2, 1, 0.6); // Pipihkan dada
        torso.position.y = 1.2;
        model.add(torso);

        // 2. Head (Ovoid Shape, bukan bola bulat)
        const headGeo = new THREE.SphereGeometry(0.18, 32, 32);
        const head = new THREE.Mesh(headGeo, bodyMat);
        head.scale.set(0.9, 1.1, 1); // Bentuk muka lonjong
        head.position.y = 1.9;
        model.add(head);

        // 3. Shoulders (Bagi nampak tegap)
        const shoulderGeo = new THREE.SphereGeometry(0.15, 16, 16);
        const shL = new THREE.Mesh(shoulderGeo, bodyMat);
        shL.position.set(0.45, 1.6, 0);
        const shR = shL.clone();
        shR.position.x = -0.45;
        model.add(shL, shR);

        // 4. Arms (Tapered - besar atas, kecik bawah)
        function createArm(isLeft) {
            const arm = new THREE.Group();
            const upper = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.06, 0.5), bodyMat);
            const lower = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.04, 0.5), bodyMat);
            upper.position.y = -0.25;
            lower.position.y = -0.75;
            arm.add(upper, lower);
            arm.position.set(isLeft ? 0.45 : -0.45, 1.6, 0);
            return arm;
        }
        const armL = createArm(true);
        const armR = createArm(false);
        model.add(armL, armR);

        // 5. Legs (Powerful Athletic Thighs)
        function createLeg(isLeft) {
            const leg = new THREE.Group();
            const thigh = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.1, 0.7), bodyMat);
            const calf = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.05, 0.7), bodyMat);
            thigh.position.y = -0.35;
            calf.position.y = -1.0;
            leg.add(thigh, calf);
            leg.position.set(isLeft ? 0.18 : -0.18, 0.7, 0);
            return leg;
        }
        const legL = createLeg(true);
        const legR = createLeg(false);
        model.add(legL, legR);

        scene.add(model);
        camera.position.set(0, 1.2, 5);

        // ANIMATION: Shadow Boxer Mode
        function animate() {
            requestAnimationFrame(animate);
            const t = Date.now() * 0.003;
            
            // Pergerakan bahu/badan bila "pusing"
            model.rotation.y = Math.sin(t * 0.5) * 0.2;
            
            // Animasi tumbuk (Arm Extension)
            armL.rotation.x = Math.sin(t) * 0.8; 
            armR.rotation.x = Math.cos(t) * 0.8;

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
