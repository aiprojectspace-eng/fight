<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleek Humanoid - Three.js Demo</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050505; font-family: sans-serif; }
        #info { position: absolute; top: 10px; width: 100%; text-align: center; color: white; pointer-events: none; }
    </style>
</head>
<body>
    <div id="info">Sleek Humanoid Demo (No Sprites)<br>Using Three.js Procedural Geometry</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // 1. Scene Setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // 2. Lighting (Ini yang buat dia nampak "Pro")
        const ambientLight = new THREE.AmbientLight(0x404040, 2); 
        scene.add(ambientLight);

        const pointLight = new THREE.PointLight(0xff0044, 50, 100);
        pointLight.position.set(5, 5, 5);
        scene.add(pointLight);

        const blueLight = new THREE.PointLight(0x00ffff, 30, 100);
        blueLight.position.set(-5, 2, 2);
        scene.add(blueLight);

        // 3. Create Humanoid (Sleek Style)
        const group = new THREE.Group();
        
        // Material: Shiny & Metallic (Bukan Roblox style)
        const material = new THREE.MeshStandardMaterial({ 
            color: 0x222222, 
            roughness: 0.1, 
            metalness: 0.8,
            emissive: 0xff0044,
            emissiveIntensity: 0.2
        });

        // Kepala (Sphere smooth)
        const head = new THREE.Mesh(new THREE.SphereGeometry(0.25, 32, 32), material);
        head.position.y = 1.6;
        group.add(head);

        // Badan (Capsule - nampak lebih organik dari kotak)
        const torso = new THREE.Mesh(new THREE.CapsuleGeometry(0.25, 0.7, 20, 20), material);
        torso.position.y = 1.0;
        group.add(torso);

        // Tangan & Kaki (Lagi Capsules)
        function createLimb(x, y, z) {
            const limb = new THREE.Mesh(new THREE.CapsuleGeometry(0.08, 0.5, 15, 15), material);
            limb.position.set(x, y, z);
            return limb;
        }

        const armL = createLimb(0.4, 1.2, 0);
        const armR = createLimb(-0.4, 1.2, 0);
        const legL = createLimb(0.15, 0.3, 0);
        const legR = createLimb(-0.15, 0.3, 0);

        group.add(armL, armR, legL, legR);
        scene.add(group);

        camera.position.z = 4;
        camera.position.y = 1;

        // 4. Animation Loop
        function animate() {
            requestAnimationFrame(animate);

            const time = Date.now() * 0.002;

            // Gerakan 'Idle' yang smooth guna Math.sin
            group.rotation.y += 0.01;
            head.position.y = 1.6 + Math.sin(time) * 0.02;
            armL.rotation.z = Math.sin(time) * 0.2 + 0.2;
            armR.rotation.z = -Math.sin(time) * 0.2 - 0.2;

            renderer.render(scene, camera);
        }

        // Handle Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
